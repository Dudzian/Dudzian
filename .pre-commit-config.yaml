repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format
        files: '^(bot_core|core|scripts|tests|deploy|stage6_samples|ui)/.*\.(py|pyi)$'
        exclude: '^ui/(?:(?:vendor|generated|dist)/|(?:.*/)?node_modules/)'
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        pass_filenames: false
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - grpcio>=1.62
          - protobuf>=4.24
          - packaging
