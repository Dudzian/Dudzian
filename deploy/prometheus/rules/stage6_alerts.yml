groups:
  - name: stage6-resilience
    interval: 1m
    rules:
      - alert: Stage6SLODegradation
        expr: stage6_slo_error_budget_remaining < 0.05
        for: 5m
        labels:
          severity: critical
          stage: stage6
        annotations:
          summary: "Stage6: Budżet błędów SLO jest na wyczerpaniu"
          description: |
            Pozostały budżet błędów SLO spadł poniżej 5%. PortfolioGovernor powinien ograniczyć ekspozycję.
      - alert: Stage6FailoverDrillStale
        expr: time() - stage6_failover_last_success_timestamp > 86400
        for: 10m
        labels:
          severity: warning
          stage: stage6
        annotations:
          summary: "Stage6: Ćwiczenie failover nie było wykonywane w ciągu 24h"
          description: |
            Ostatni udany failover drill był ponad 24 godziny temu. Zaplanuj ponowne uruchomienie.
      - alert: Stage6ObservabilityBundleLagging
        expr: time() - stage6_observability_bundle_generated_timestamp > 43200
        for: 10m
        labels:
          severity: warning
          stage: stage6
        annotations:
          summary: "Stage6: Paczka obserwowalności jest przeterminowana"
          description: |
            Paczka obserwowalności Stage6 nie była regenerowana od ponad 12 godzin. Uruchom eksport.

      - alert: LicensingDriftRebindRequired
        expr: sum(licensing_drift_status{status="rebind_required"}) > 0
        for: 5m
        labels:
          severity: critical
          stage: licensing
        annotations:
          summary: "Licensing: wykryto scenariusz wymagający rebind"
          description: |
            Co najmniej jeden scenariusz dryfu HWID wymaga ponownego podpisania licencji. Sprawdź artefakt
            reports/ci/licensing_drift/licensing_drift_summary.json lub dashboard Grafany i eskaluj do OEM/SRE.

      - alert: LicensingDriftDegradedSpike
        expr: sum_over_time(licensing_drift_status{status="degraded"}[7d]) > 3
        for: 10m
        labels:
          severity: warning
          stage: licensing
        annotations:
          summary: "Licensing: rosnąca liczba tolerowanych dryfów"
          description: |
            W ciągu ostatnich 7 dni pojawiło się więcej niż trzy tolerowane dryfy HWID. Zweryfikuj raporty dryfu
            oraz zaplanuj serwis sprzętu zanim pojawią się odrzucenia licencji.

