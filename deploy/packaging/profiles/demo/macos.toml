platform = "macos"

[pyinstaller]
entrypoint = "../../../scripts/run_local_bot.py"
runtime_name = "bot_core_runtime"
hidden_imports = [
  "bot_core.runtime.bootstrap",
  "bot_core.runtime.pipeline",
  "bot_core.runtime.config",
]
dist_dir = "../../../var/dist/pyinstaller/macos"
work_dir = "../../../var/build/pyinstaller/macos"

[briefcase]
project = "../../../ui/briefcase"
app = "BotTradingShell"
output_dir = "../../../var/dist/briefcase/macos"

[bundle]
output_dir = "../../../var/dist/installers/macos"
work_dir = "../../../var/build/installers/macos"
qt_dist = "../assets/demo/ui"
include = [
  "config=../assets/demo/config",
  "daemon=../assets/demo/daemon",
  "resources=../assets/demo/resources",
  "reports=../assets/demo/reports",
  "var=../assets/demo/var",
]
wheels_extra = [
  "../assets/demo/wheels/ccxt-4.0.0-py3-none-any.whl",
  "../assets/demo/wheels/aiohttp-3.9.5-cp311-cp311-manylinux.whl",
  "../assets/demo/wheels/lightgbm-4.6.0-cp311-cp311-manylinux.whl",
]
metadata_path = "../../../var/dist/installers/macos/installer_metadata.json"
