name: Windows Self-Hosted CI

on:
  workflow_dispatch:
    inputs:
      jobs:
        description: "Comma-separated jobs to run (prepare-wheelhouse, lint-and-test, bot-core-fast-tests, ui-packaging-windows, ui-native-tests, release-quality-gates)"
        required: true
        default: "prepare-wheelhouse"
        type: string
      wheelhouse_source:
        description: "Source for wheelhouse (artifact | local_path | none)"
        required: true
        default: artifact
        type: choice
        options:
          - artifact
          - local_path
          - none
      wheelhouse_local_path:
        description: "Local wheelhouse path on runner when using local_path"
        required: false
        default: ""
        type: string
      pyside6_version:
        description: "Override PySide6 version"
        required: false
        default: "6.7.0"
        type: string
      upload_artifacts:
        description: "Upload artifacts/local-ci and test-results"
        required: false
        default: true
        type: boolean

concurrency:
  group: windows-self-hosted
  cancel-in-progress: false

env:
  PYSIDE6_VERSION: "6.7.0"

jobs:
  windows-self-hosted:
    name: Windows self-hosted jobs
    runs-on: [self-hosted, Windows]
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve PySide6 version
        shell: pwsh
        run: |
          $version = if ('${{ inputs.pyside6_version }}') { '${{ inputs.pyside6_version }}' } else { '$env:PYSIDE6_VERSION' }
          echo "PYSIDE6_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure wheelhouse directory
        shell: pwsh
        run: |
          switch ('${{ inputs.wheelhouse_source }}') {
            'artifact' { echo "WHEELHOUSE_DIR=$PWD/wheelhouse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }
            'local_path' {
              if ('${{ inputs.wheelhouse_local_path }}') {
                echo "WHEELHOUSE_DIR=${{ inputs.wheelhouse_local_path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              }
            }
            default { }
          }

      - name: Download wheelhouse artifact
        if: inputs.wheelhouse_source == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse-windows-py3.11
          path: wheelhouse

      - name: Prepare wheelhouse
        if: contains(inputs.jobs, 'prepare-wheelhouse')
        shell: pwsh
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          ./scripts/ci/run_windows.ps1 -Job prepare-wheelhouse $wheelArg

      - name: Lint and Test
        if: contains(inputs.jobs, 'lint-and-test')
        shell: pwsh
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          ./scripts/ci/run_windows.ps1 -Job lint-and-test $wheelArg

      - name: Bot Core Fast Tests
        if: contains(inputs.jobs, 'bot-core-fast-tests')
        shell: pwsh
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          ./scripts/ci/run_windows.ps1 -Job bot-core-fast-tests $wheelArg

      - name: UI Packaging (Windows)
        if: contains(inputs.jobs, 'ui-packaging-windows')
        shell: pwsh
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          ./scripts/ci/run_windows.ps1 -Job ui-packaging-windows $wheelArg

      - name: UI Native Tests
        if: contains(inputs.jobs, 'ui-native-tests')
        shell: pwsh
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          ./scripts/ci/run_windows.ps1 -Job ui-native-tests $wheelArg

      - name: Release Quality Gates
        if: contains(inputs.jobs, 'release-quality-gates')
        shell: pwsh
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          ./scripts/ci/run_windows.ps1 -Job release-quality-gates $wheelArg

      - name: Upload artifacts
        if: always() && inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: windows-selfhost-artifacts
          path: |
            artifacts/local-ci
            test-results
            wheelhouse
          if-no-files-found: warn
          retention-days: 7

      - name: Job summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "Artifacts rooted at $(Join-Path $PWD 'artifacts/local-ci')"
          if (Test-Path "wheelhouse") { Write-Host "Wheelhouse at $(Resolve-Path wheelhouse)" }
          if (Test-Path "test-results") { Write-Host "Test results at $(Resolve-Path test-results)" }
