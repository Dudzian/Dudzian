name: Manual Windows Self-Hosted

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: lint-and-test
        type: choice
        options:
          - prepare-wheelhouse
          - lint-and-test
          - bot-core-fast-tests
          - ui-packaging-windows
          - ui-native-tests
          - release-quality-gates
      # wheelhouse_source options:
      # - artifact: download the wheelhouse artifact produced by prepare-wheelhouse
      # - local_path: reuse an existing directory on the self-hosted runner (set wheelhouse_local_path)
      # - none: skip wheelhouse usage entirely
      wheelhouse_source:
        description: "Source for wheelhouse"
        required: true
        default: artifact
        type: choice
        options:
          - artifact
          - local_path
          - none
      wheelhouse_local_path:
        description: "Local path to wheelhouse directory (used when wheelhouse_source=local_path)"
        required: false
        default: ""
        type: string
      upload_artifacts:
        description: "Upload artifacts/local-ci and test-results"
        required: false
        default: true
        type: boolean

concurrency:
  group: windows-selfhosted
  cancel-in-progress: false

env:
  CI: "1"
  # Non-dispatch triggers default to wheelhouse_source=none to avoid missing artifacts; set wheelhouse_source when manually dispatching.

jobs:
  # Postęp: 20% (ukończone kroki: 1)
  prepare-wheelhouse-windows:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.job == 'prepare-wheelhouse' ||
      (
        contains(fromJson('["lint-and-test","bot-core-fast-tests","ui-packaging-windows","ui-native-tests","release-quality-gates"]'), github.event.inputs.job)
        && github.event.inputs.wheelhouse_source == 'artifact'
      )
    name: Prepare Wheelhouse (Windows self-hosted)
    runs-on: [self-hosted, windows]
    timeout-minutes: 240
    env:
      PREPARE_WHEELHOUSE_REQUESTED: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'prepare-wheelhouse' || github.event.inputs.wheelhouse_source == 'artifact') }}
      SELECTED_JOB: prepare-wheelhouse
      WHEELHOUSE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.wheelhouse_source || 'none' }}
      WHEELHOUSE_LOCAL_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.wheelhouse_local_path || '' }}
      UPLOAD_ARTIFACTS: ${{ inputs.upload_artifacts != 'false' }}

    steps:
      - name: Skip prepare when wheelhouse not requested for this run
        if: env.PREPARE_WHEELHOUSE_REQUESTED != 'true'
        run: echo "wheelhouse preparation skipped; add wheelhouse_source=artifact when dispatching to reuse wheelhouse"

      - name: Check out repository
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true'
        uses: actions/checkout@v4

      - name: Check existing Python
        id: python_check
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true'
        shell: pwsh
        run: python --version
        continue-on-error: true

      - name: Setup Python 3.11
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true' && steps.python_check.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true'
        shell: pwsh
        run: python --version

      - &configure-wheelhouse
        name: Configure wheelhouse directory
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true'
        shell: pwsh
        run: |
          switch ("$env:WHEELHOUSE_SOURCE") {
            'artifact' {
              "WHEELHOUSE_DIR=$env:GITHUB_WORKSPACE\wheelhouse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            'local_path' {
              if (-not "$env:WHEELHOUSE_LOCAL_PATH") {
                Write-Error "wheelhouse_local_path is required when wheelhouse_source=local_path"
              } elseif (-not (Test-Path "$env:WHEELHOUSE_LOCAL_PATH")) {
                Write-Error "wheelhouse_local_path '$env:WHEELHOUSE_LOCAL_PATH' does not exist on the runner"
              } else {
                "WHEELHOUSE_DIR=$env:WHEELHOUSE_LOCAL_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              }
            }
            'none' {
              Write-Host "wheelhouse_source=none -> skipping wheelhouse usage"
              "WHEELHOUSE_DIR=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            default {
              Write-Error "Unknown wheelhouse_source '$env:WHEELHOUSE_SOURCE'"
            }
          }

      - &download-wheelhouse
        name: Download wheelhouse artifact
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true' && env.WHEELHOUSE_SOURCE == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse-windows
          path: wheelhouse
          if-no-artifact-found: error

      - name: Python and proxy diagnostics
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true'
        shell: pwsh
        run: |
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python -m pip config debug -v
          } else {
            Write-Host "python command not found"
          }
          Write-Host "HTTP_PROXY=$env:HTTP_PROXY"
          Write-Host "HTTPS_PROXY=$env:HTTPS_PROXY"
          Write-Host "NO_PROXY=$env:NO_PROXY"
          Write-Host "PIP_INDEX_URL=$env:PIP_INDEX_URL"
          Write-Host "PIP_EXTRA_INDEX_URL=$env:PIP_EXTRA_INDEX_URL"
          if ($env:WHEELHOUSE_DIR) {
            Write-Host "WHEELHOUSE_DIR=$env:WHEELHOUSE_DIR"
            if (Test-Path $env:WHEELHOUSE_DIR) {
              Write-Host "Wheelhouse exists. Listing first 20 entries:"
              Get-ChildItem -Path $env:WHEELHOUSE_DIR | Select-Object -First 20 | Format-Table -AutoSize
            } else {
              Write-Host "Wheelhouse path does not exist on disk (yet)."
            }
          }

      - name: Run scripts/ci/run_windows.ps1
        if: env.PREPARE_WHEELHOUSE_REQUESTED == 'true'
        shell: pwsh
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          powershell -ExecutionPolicy Bypass -File scripts/ci/run_windows.ps1 -Job "$env:SELECTED_JOB" $wheelArg

      - name: Upload artifacts (logs/results)
        if: always() && env.PREPARE_WHEELHOUSE_REQUESTED == 'true' && env.UPLOAD_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-selfhost-artifacts
          path: |
            artifacts/local-ci/**
            test-results/**
          if-no-files-found: warn

      - name: Upload wheelhouse artifact
        if: always() && env.PREPARE_WHEELHOUSE_REQUESTED == 'true' && env.UPLOAD_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-windows
          path: wheelhouse/**
          if-no-files-found: warn

  # Postęp: 40% (ukończone kroki: 1, 2)
  lint-and-test-windows:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.job == 'lint-and-test'
    name: Lint and Test (Windows self-hosted)
    # Postęp: 60% (ukończone kroki: 1, 2, 3)
    # Aby w jednej runce odpalić przygotowanie wheelhouse i linty: wybierz job=lint-and-test oraz wheelhouse_source=artifact.
    needs: prepare-wheelhouse-windows
    runs-on: [self-hosted, windows]
    timeout-minutes: 240
    env:
      PREPARE_WHEELHOUSE_REQUESTED: ${{ github.event_name == 'workflow_dispatch' && inputs.wheelhouse_source != 'none' }}
      SELECTED_JOB: lint-and-test
      WHEELHOUSE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.wheelhouse_source || 'none' }}
      WHEELHOUSE_LOCAL_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.wheelhouse_local_path || '' }}
      UPLOAD_ARTIFACTS: ${{ inputs.upload_artifacts != 'false' }}

    steps:
