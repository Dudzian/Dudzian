name: Manual Windows Self-Hosted

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: lint-and-test
        type: choice
        options:
          - prepare-wheelhouse
          - lint-and-test
          - bot-core-fast-tests
          - ui-packaging-windows
          - ui-native-tests
          - release-quality-gates
      wheelhouse_source:
        description: "Source for wheelhouse"
        required: true
        default: artifact
        type: choice
        options:
          - artifact
          - local_path
          - none
      wheelhouse_local_path:
        description: "Local path to wheelhouse directory (used when wheelhouse_source=local_path)"
        required: false
        default: ""
        type: string
      upload_artifacts:
        description: "Upload artifacts/local-ci and test-results"
        required: false
        default: true
        type: boolean

concurrency:
  group: windows-selfhosted
  cancel-in-progress: false

env:
  CI: "1"

jobs:
  windows_selfhosted:
    name: Windows self-hosted job
    runs-on: [self-hosted, windows]
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check existing Python
        id: python_check
        shell: pwsh
        run: python --version
        continue-on-error: true

      - name: Setup Python 3.11
        if: steps.python_check.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python
        shell: pwsh
        run: python --version

      - name: Configure wheelhouse directory
        shell: pwsh
        run: |
          switch ('${{ inputs.wheelhouse_source }}') {
            'artifact'   { "WHEELHOUSE_DIR=$env:GITHUB_WORKSPACE\wheelhouse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }
            'local_path' {
              if ('${{ inputs.wheelhouse_local_path }}') {
                "WHEELHOUSE_DIR=${{ inputs.wheelhouse_local_path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              } else {
                Write-Error "wheelhouse_local_path is required when wheelhouse_source=local_path"
              }
            }
            default { }
          }

      - name: Download wheelhouse artifact
        if: inputs.wheelhouse_source == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse-windows
          path: wheelhouse
          if-no-artifact-found: error

      - name: Python and proxy diagnostics
        shell: pwsh
        run: |
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python -m pip config debug -v
          } else {
            Write-Host "python command not found"
          }
          Write-Host "HTTP_PROXY=$env:HTTP_PROXY"
          Write-Host "HTTPS_PROXY=$env:HTTPS_PROXY"
          Write-Host "NO_PROXY=$env:NO_PROXY"
          Write-Host "PIP_INDEX_URL=$env:PIP_INDEX_URL"
          Write-Host "PIP_EXTRA_INDEX_URL=$env:PIP_EXTRA_INDEX_URL"
          if ($env:WHEELHOUSE_DIR) {
            Write-Host "WHEELHOUSE_DIR=$env:WHEELHOUSE_DIR"
            if (Test-Path $env:WHEELHOUSE_DIR) {
              Write-Host "Wheelhouse exists. Listing first 20 entries:"
              Get-ChildItem -Path $env:WHEELHOUSE_DIR | Select-Object -First 20 | Format-Table -AutoSize
            } else {
              Write-Host "Wheelhouse path does not exist on disk (yet)."
            }
          }

      - name: Run scripts/ci/run_windows.ps1
        shell: pwsh
        run: |
          $wheelArg = ""
          if ($env:WHEELHOUSE_DIR) { $wheelArg = "-Wheelhouse `"$env:WHEELHOUSE_DIR`"" }
          powershell -ExecutionPolicy Bypass -File scripts/ci/run_windows.ps1 -Job '${{ inputs.job }}' $wheelArg

      - name: Upload artifacts (logs/results)
        if: always() && inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: windows-selfhost-artifacts
          path: |
            artifacts/local-ci/**
            test-results/**
          if-no-files-found: warn

      - name: Upload wheelhouse artifact
        if: always() && inputs.upload_artifacts == true && inputs.job == 'prepare-wheelhouse'
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-windows
          path: wheelhouse/**
          if-no-files-found: warn
