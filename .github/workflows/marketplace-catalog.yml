name: Marketplace Catalog

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  validate-marketplace:
    name: Validate marketplace presets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic
          pip install -r deploy/packaging/requirements-desktop.txt
          pip install .[desktop]

      - name: Validate marketplace presets (signatures + markdown)
        run: >-
          python scripts/validate_marketplace_presets.py
          --presets config/marketplace/presets
          --hmac-key config/marketplace/keys/dev-hmac.key
          --ed25519-key config/marketplace/keys/dev-presets-ed25519.pub
          --min-count 15

      - name: Validate catalog signatures and QA coverage
        run: >-
          python scripts/build_release_bundle.py
          --catalog config/marketplace/catalog.json
          --markdown config/marketplace/catalog.md
          --packages config/marketplace/packages
          --installer-root deploy/packaging/samples
          --check-only
          --require-clean

      - name: Upload marketplace catalog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-catalog-latest
          if-no-files-found: error
          path: |
            config/marketplace/catalog.json
            config/marketplace/catalog.json.sig
            config/marketplace/catalog.md
            config/marketplace/catalog.md.sig
