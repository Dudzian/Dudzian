name: Marketplace Catalog

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  validate-marketplace:
    name: Validate marketplace presets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deploy/packaging/requirements-desktop.txt

      - name: Validate marketplace presets (signatures + markdown)
        run: >-
          python scripts/validate_marketplace_presets.py
          --presets config/marketplace/presets
          --hmac-key config/marketplace/keys/dev-hmac.key
          --ed25519-key config/marketplace/keys/dev-presets-ed25519.pub
          --min-count 15
