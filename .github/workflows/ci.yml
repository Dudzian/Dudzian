name: CI
run-name: "CI (${{ github.event_name }}: ${{ github.ref_name }})"

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  PYSIDE6_VERSION: "6.5.2"
  QT_DESKTOP_MODULES: "qtcharts qtdeclarative qtquickcontrols2"
  QT_WINDOWS_MODULES: "qtcharts qtdeclarative qtquickcontrols2"

jobs:
  prepare-pyside6-wheel:
    name: Prepare PySide6 wheels (Linux)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
        (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/stable' || github.ref == 'refs/heads/main'))
    timeout-minutes: 25

    steps:
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare wheelhouse directory
        run: mkdir -p wheelhouse

      - name: Cache PySide6 wheels
        id: wheel-cache
        uses: actions/cache@v4
        with:
          path: wheelhouse
          key: pyside6-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ env.PYSIDE6_VERSION }}

      - name: Download PySide6 distribution
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip download PySide6==${{ env.PYSIDE6_VERSION }} --dest wheelhouse --only-binary=:all:

      - name: Upload PySide6 wheels
        uses: actions/upload-artifact@v4
        with:
          name: pyside6-wheels-linux-${{ env.PYSIDE6_VERSION }}
          path: wheelhouse
          if-no-files-found: error
          retention-days: 3

  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for UI tests
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install pytest pytest-cov pre-commit

      - name: Pre-commit (ruff + mypy)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Pytest with coverage
        run: >-
          pytest
          --cov=bot_core.strategies
          --cov=bot_core.runtime.multi_strategy_scheduler
          --cov=bot_core.runtime.journal
          --cov-config=.coveragerc
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=75
          tests/test_pipeline_paper.py
          tests/test_risk_profiles.py
          tests/test_mean_reversion_strategy.py
          tests/test_volatility_target_strategy.py
          tests/test_cross_exchange_arbitrage_strategy.py
          tests/test_multi_strategy_scheduler.py
          tests/test_backtest_dataset_library.py
          tests/test_telemetry_risk_profiles.py
          tests/test_trading_decision_journal.py
          tests/test_smoke_demo_strategies_cli.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 3

  licensing-hwid-tolerance:
    name: Licensing HWID Tolerance
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run HWID tolerance tests
        run: pytest tests/licensing -q

  mypy-core:
    name: Mypy (core packages)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install mypy

      - name: Run mypy for core packages
        run: python -m mypy

  release-quality-gates:
    name: Release Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Install system dependencies for UI tests
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Install mypy
        run: pip install mypy

      - name: Type check with mypy
        run: mypy

      - name: Pytest demo→paper scenario
        run: pytest -m e2e_demo_paper --maxfail=1 --disable-warnings

      - name: Pytest paper execution smoke
        run: pytest tests/test_paper_execution.py

      - name: Pytest execution router integrations
        run: pytest tests/integration/test_execution_router_failover.py

  bot-core-fast-tests:
    name: Bot Core Fast Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Install system dependencies for UI tests
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Run fast pytest suite
        env:
          PYTEST_FAST: "1"
        run: |
          mkdir -p test-results
          pytest --fast --maxfail=1 --durations=10 --junitxml=test-results/pytest.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-core-pytest-results
          path: test-results/pytest.xml
          retention-days: 3

      - name: Generate champion diff audit report
        if: always()
        run: >-
          python -m scripts.audit.champion_diff
          --lhs deploy/packaging/samples/var/models/quality
          --rhs var/models/quality
          --output-dir audit/champion_diffs_ci
          --tag ci

      - name: Upload champion diff audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: champion-quality-diff
          path: audit/champion_diffs_ci
          if-no-files-found: warn
          retention-days: 3

  loopback-e2e:
    name: Loopback E2E
    runs-on: ubuntu-latest
    needs: bot-core-fast-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run loopback tests via Docker Compose
        run: docker compose -f deploy/compose/loopback-tests.yml up --abort-on-container-exit

  exchange-report:
    name: Exchange HyperCare Report
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Generate exchange adapter report
        run: |
          REPORT_DATE=$(date +%Y-%m-%d)
          python scripts/list_exchange_adapters.py \
            --report-date "${REPORT_DATE}" \
            --report-dir reports/exchanges \
            --push-dashboard \
            --dashboard-dir reports/exchanges/signal_quality \
            --hypercare-config config/stage6/hypercare.yaml \
            --hypercare-dir reports/exchanges/hypercare \
            --daily-csv-dir reports/exchanges \
            --long-poll-metrics var/metrics/long_poll_snapshots.json \
            --generate-hypercare-assets

      - name: Inspect signal quality snapshots
        run: ls -l reports/exchanges/signal_quality

      - name: Upload exchange report snapshot
        uses: actions/upload-artifact@v4
        with:
          name: exchange-report
          path: |
            reports/exchanges
            reports/exchanges/signal_quality
          retention-days: 3

      - name: Tear down compose
        if: always()
        run: docker compose -f deploy/compose/loopback-tests.yml down -v

  marketing-bundle-parity:
    name: Marketing bundle parity
    runs-on: ubuntu-latest
    needs: exchange-report
    env:
      MIRROR_S3_URI: ${{ secrets.MARKETING_PARITY_MIRROR_S3 || vars.MARKETING_PARITY_MIRROR_S3 }}
      MIRROR_GIT_REPO: ${{ secrets.MARKETING_PARITY_MIRROR_GIT || vars.MARKETING_PARITY_MIRROR_GIT }}
      MIRROR_SUBPATH: ${{ vars.MARKETING_PARITY_MIRROR_SUBPATH }}

      steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Set up Python
          id: setup-python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

      - name: Download exchange report artefact
        uses: actions/download-artifact@v4
        with:
          name: exchange-report
          path: artifacts/exchange-report

      - name: Download latest Stress Lab artefact
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: stress-lab-report.yml
          name: stress-lab-report
          branch: ${{ github.event.pull_request.base.ref || github.ref_name }}
          repo: ${{ github.repository }}
          path: artifacts/stress-lab-report

      - name: Sync mirror from S3
        if: env.MIRROR_S3_URI != ''
        run: |
          aws s3 sync "${MIRROR_S3_URI}" mirror --exact-timestamps
          echo "MIRROR_ROOT=mirror/${MIRROR_SUBPATH:-benchmark}" >> "$GITHUB_ENV"

      - name: Clone mirror Git repository
        if: env.MIRROR_S3_URI == '' && env.MIRROR_GIT_REPO != ''
        run: |
          git clone --depth=1 "${MIRROR_GIT_REPO}" mirror_git
          echo "MIRROR_ROOT=mirror_git/${MIRROR_SUBPATH:-benchmark}" >> "$GITHUB_ENV"

      - name: Ensure mirror location configured
        run: |
          if [ -z "${MIRROR_ROOT}" ]; then
            echo "Mirror location not configured; set MARKETING_PARITY_MIRROR_S3 or MARKETING_PARITY_MIRROR_GIT." >&2
            exit 1
          fi
        env:
          MIRROR_ROOT: ${{ env.MIRROR_ROOT }}

      - name: Validate marketing bundle parity
        run: |
          python -m scripts.audit.marketing_parity_check \
            --stress-lab-dir artifacts/stress-lab-report/reports/stress_lab \
            --signal-quality-index artifacts/exchange-report/reports/exchanges/signal_quality/index.csv \
            --mirror-dir "${MIRROR_ROOT}" \
            --audit-output docs/audit/marketing_parity_report.md \
            --json-output docs/audit/marketing_parity_report.json

      - name: Upload parity audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-parity-report
          path: |
            docs/audit/marketing_parity_report.md
            docs/audit/marketing_parity_report.json
          if-no-files-found: error


  ui-ctest:
    name: UI Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config \
            libprotobuf-dev protobuf-compiler protobuf-compiler-grpc \
            libgrpc-dev libgrpc++-dev libarchive-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: 6.5.3
          modules: ${{ env.QT_DESKTOP_MODULES }}

      - name: Configure CMake
        run: cmake -S ui -B ui/build-tests -G Ninja -DBUILD_TESTING=ON -DCMAKE_PREFIX_PATH=$Qt6_DIR

      - name: Build UI tests
        run: cmake --build ui/build-tests

      - name: Run UI test suite
        run: ctest --test-dir ui/build-tests --output-on-failure

  ui-tests:
    name: UI QML Tests
    runs-on: ubuntu-latest
    needs: prepare-pyside6-wheel
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
      PYTEST_REQUIRE_QML: "1"
      QML_DIAGNOSTICS_DIR: test-results/qml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0

      - name: Download PySide6 wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyside6-wheels-linux-${{ env.PYSIDE6_VERSION }}
          path: wheelhouse

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links wheelhouse \
            PySide6==${{ env.PYSIDE6_VERSION }} \
            PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
            PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
            shiboken6==${{ env.PYSIDE6_VERSION }}
          pip install .[dev]

      - name: Run QML pytest suite
        run: |
          mkdir -p test-results/qml
          pytest -m qml --maxfail=1 --disable-warnings \
            --junitxml=test-results/qml/pytest.xml --durations=15

      - name: Upload QML diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-test-diagnostics
          path: test-results/qml
          if-no-files-found: warn
          retention-days: 3

  grpc-feed-integration:
    name: gRPC Decision Feed Integration
    runs-on: ubuntu-latest
    needs: prepare-pyside6-wheel
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0

      - name: Download PySide6 wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyside6-wheels-linux-${{ env.PYSIDE6_VERSION }}
          path: wheelhouse

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links wheelhouse \
            PySide6==${{ env.PYSIDE6_VERSION }} \
            PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
            PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
            shiboken6==${{ env.PYSIDE6_VERSION }}
          pip install .[dev]

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Run gRPC decision feed tests
        run: |
          mkdir -p test-results/grpc
          pytest tests/integration/test_grpc_transport.py --maxfail=1 --disable-warnings \
            --junitxml=test-results/grpc/pytest.xml

      - name: Assert gRPC decision feed SLO
        run: |
          python - <<'PY'
          import json
          import pathlib
          import yaml

          metrics_path = pathlib.Path("reports/ci/decision_feed_metrics.json")
          if not metrics_path.exists():
              raise SystemExit("Brak pliku decision_feed_metrics.json")
          payload = json.loads(metrics_path.read_text(encoding="utf-8"))
          config_path = pathlib.Path("config/runtime.yaml")
          feed_sla = {
              "latency_warning_ms": 3000.0,
              "latency_critical_ms": 5000.0,
              "reconnects_warning": 3.0,
              "downtime_warning_seconds": 30.0,
          }
          if config_path.exists():
              config = yaml.safe_load(config_path.read_text(encoding="utf-8")) or {}
              feed_sla.update(((config.get("observability") or {}).get("feed_sla")) or {})

          p95_ms = float(payload.get("p95_ms", 0.0))
          if p95_ms > float(feed_sla["latency_warning_ms"]):
              raise SystemExit(
                  f"Latencja p95 {p95_ms:.2f} ms przekracza próg ostrzegawczy {feed_sla['latency_warning_ms']} ms"
              )
          reconnects = float(payload.get("reconnects", 0.0))
          if reconnects > float(feed_sla["reconnects_warning"]):
              raise SystemExit(
                  f"Liczba reconnectów {reconnects} przekracza próg {feed_sla['reconnects_warning']}"
              )
          downtime_ms = float(payload.get("downtimeMs", payload.get("downtime_ms", 0.0)))
          if downtime_ms < 0.0:
              raise SystemExit(f"downtimeMs ujemne: {downtime_ms}")
          downtime_seconds = float(payload.get("downtime_seconds", downtime_ms / 1000.0))
          if downtime_seconds > float(feed_sla.get("downtime_warning_seconds", 30.0)):
              raise SystemExit(
                  f"Downtime {downtime_seconds}s przekracza próg {feed_sla.get('downtime_warning_seconds', 30.0)}s"
              )
          next_retry = payload.get("nextRetrySeconds", payload.get("next_retry_seconds"))
          if next_retry is not None and float(next_retry) < 0.0:
              raise SystemExit(f"nextRetrySeconds ujemne: {next_retry}")
          print(
              "decision-feed-metrics OK:",
              f"p95_ms={p95_ms} <= {feed_sla['latency_warning_ms']} ms,",
              f"reconnects={reconnects} <= {feed_sla['reconnects_warning']},",
              f"downtime_s={downtime_seconds} <= {feed_sla.get('downtime_warning_seconds', 30.0)}",
          )
          PY

      - name: Generate feed alert summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import pathlib

          metrics_path = pathlib.Path("reports/ci/decision_feed_metrics.json")
          alert_path = pathlib.Path("reports/ci/decision_feed_alerts.json")
          summary: dict[str, object]
          if metrics_path.exists():
              payload = json.loads(metrics_path.read_text(encoding="utf-8"))
              summary = {
                  "latency_state": payload.get("latency_state", "unknown"),
                  "reconnects_state": payload.get("reconnects_state", "unknown"),
                  "downtime_state": payload.get("downtime_state", "unknown"),
                  "p95_ms": payload.get("p95_ms"),
                  "reconnects": payload.get("reconnects"),
                  "downtime_seconds": payload.get("downtime_seconds", payload.get("downtimeMs", 0.0) / 1000.0),
                  "transports": payload.get("transports", {}),
                  "status": payload.get("status", "unknown"),
              }
          else:
              summary = {"status": "missing_metrics"}
          alert_path.parent.mkdir(parents=True, exist_ok=True)
          alert_path.write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grpc-feed-pytest-results
          path: test-results/grpc
          if-no-files-found: warn
          retention-days: 3

      - name: Upload decision feed metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-feed-metrics
          path: reports/ci/decision_feed_metrics.json
          if-no-files-found: warn
          retention-days: 3

      - name: Upload feed alert diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-feed-alerts
          path: |
            reports/ci/decision_feed_alerts.json
            logs/ui_telemetry_alerts.jsonl
          if-no-files-found: warn
          retention-days: 3

  grpc-feed-soak:
    name: gRPC Feed Soak (cron)
    runs-on: ubuntu-latest
    needs: prepare-pyside6-wheel
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0

      - name: Download PySide6 wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyside6-wheels-linux-${{ env.PYSIDE6_VERSION }}
          path: wheelhouse

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links wheelhouse \
            PySide6==${{ env.PYSIDE6_VERSION }} \
            PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
            PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
            shiboken6==${{ env.PYSIDE6_VERSION }}
          pip install .[dev]

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Run gRPC soak tests
        run: |
          mkdir -p test-results/grpc-soak
          pytest -m "soak" tests/integration/test_grpc_transport.py --maxfail=1 --disable-warnings \
            --junitxml=test-results/grpc-soak/pytest.xml

      - name: Validate soak snapshot
        run: |
          python - <<'PY'
          import json
          import pathlib

          metrics_path = pathlib.Path("reports/ci/decision_feed_metrics.json")
          if not metrics_path.exists():
              raise SystemExit("Brak pliku decision_feed_metrics.json po teście soak")
          payload = json.loads(metrics_path.read_text(encoding="utf-8"))
          required = ("consecutive_degraded_periods", "consecutive_healthy_periods", "transports", "reconnects")
          for key in required:
              if key not in payload:
                  raise SystemExit(f"Brak pola {key} w snapshotcie soak")
          if float(payload.get("reconnects", 0)) < 12:
              raise SystemExit(f"Oczekiwano min. 12 reconnectów w soak, otrzymano {payload.get('reconnects')}")
          downtime_ms = float(payload.get("downtime_ms", 0.0))
          if downtime_ms < 43_200_000.0:
              raise SystemExit(f"Zbyt niski downtime_ms w snapshotcie soak: {downtime_ms}")
          transports = payload.get("transports", {})
          fallback_reconnects = float(transports.get("fallback", {}).get("reconnects", 0))
          if fallback_reconnects < 6:
              raise SystemExit(f"Zbyt mało reconnectów fallback: {fallback_reconnects}")
          fallback_downtime = float(transports.get("fallback", {}).get("downtimeMs", 0.0))
          if fallback_downtime < 43_200_000.0:
              raise SystemExit(f"Zbyt niski downtime fallback: {fallback_downtime}")
          grpc_status = transports.get("grpc", {}).get("status")
          if grpc_status != "connected":
              raise SystemExit(f"Status transportu gRPC nie jest 'connected': {grpc_status}")
          if float(payload.get("consecutive_healthy_periods", 0)) < 2:
              raise SystemExit("Liczniki consecutive_healthy_periods nie zostały utrwalone")
          if float(payload.get("consecutive_degraded_periods", 1)) != 0:
              raise SystemExit("Liczniki consecutive_degraded_periods nie zostały zresetowane")
          print("soak snapshot OK", json.dumps(payload, ensure_ascii=False)[:200])
          PY

      - name: Upload soak pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grpc-feed-soak-pytest-results
          path: test-results/grpc-soak
          if-no-files-found: warn
          retention-days: 3

      - name: Upload soak decision feed metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-feed-soak-metrics
          path: reports/ci/decision_feed_metrics.json
          if-no-files-found: warn
          retention-days: 7

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: prepare-pyside6-wheel
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
        (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/stable' || github.ref == 'refs/heads/main'))
    concurrency:
      group: performance-benchmarks-${{ github.ref }}
      cancel-in-progress: true
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore performance history cache
        uses: actions/cache@v4
        with:
          path: reports/ci/performance_history
          key: performance-history-${{ github.ref_name }}

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0

      - name: Restore PySide6 wheel cache
        id: wheel-cache
        uses: actions/cache@v4
        with:
          path: wheelhouse
          key: pyside6-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ env.PYSIDE6_VERSION }}

      - name: Download PySide6 wheel artifact
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: pyside6-wheels-linux-${{ env.PYSIDE6_VERSION }}
          path: wheelhouse
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -d wheelhouse ] && ls wheelhouse/* >/dev/null 2>&1; then
            pip install --no-index --find-links wheelhouse \
              PySide6==${{ env.PYSIDE6_VERSION }} \
              PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
              PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
              shiboken6==${{ env.PYSIDE6_VERSION }}
          else
            pip install \
              PySide6==${{ env.PYSIDE6_VERSION }} \
              PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
              PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
              shiboken6==${{ env.PYSIDE6_VERSION }}
          fi
          pip install .[dev]

      - name: Determine performance metrics mode
        env:
          PUSHGATEWAY_URL: ${{ secrets.PERFORMANCE_METRICS_PUSHGATEWAY || vars.PERFORMANCE_METRICS_PUSHGATEWAY || vars.CI_PUSHGATEWAY_DEFAULT }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          mode="strict"
          reason="Pushgateway configured for publication"
          if [ "${EVENT_NAME}" = "pull_request" ] && [ "${IS_FORK:-false}" = "true" ]; then
            mode="fallback"
            reason="pull request from fork (secrets niedostępne)"
          elif [ -z "${PUSHGATEWAY_URL:-}" ]; then
            mode="fallback"
            reason="brak skonfigurowanego Pushgateway"
          fi

          {
            echo "METRICS_MODE=${mode}"
            echo "METRICS_MODE_REASON=${reason}"
          } >> "${GITHUB_ENV}"

          {
            echo "### Performance metrics mode"
            if [ "${mode}" = "strict" ]; then
              echo ":lock: Tryb **strict** — metryki muszą zostać opublikowane do Pushgateway; niedostępność przerwie job."
            else
              echo ":warning: Tryb **fallback** — publikacja metryk jest pomijana/best-effort, aby testy mogły się wykonać."
              echo "- Powód: ${reason}"
              echo "- Konsekwencje: raporty JSON będą dostępne jako artefakty, ale Pushgateway nie otrzyma danych z tego runu."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Check Pushgateway availability
        env:
          PUSHGATEWAY_URL: ${{ secrets.PERFORMANCE_METRICS_PUSHGATEWAY || vars.PERFORMANCE_METRICS_PUSHGATEWAY || vars.CI_PUSHGATEWAY_DEFAULT }}
        run: |
          set -euo pipefail

          if [ "${METRICS_MODE:-strict}" != "strict" ]; then
            echo "Skipping Pushgateway availability check in fallback mode (${METRICS_MODE_REASON:-no reason})."
            exit 0
          fi

          summarize_failure() {
            {
              echo "### Pushgateway availability"
              echo ":x: Pushgateway nie jest skonfigurowany lub jest niedostępny — workflow przerwany."
              echo "- Ustaw sekret/zmienną \\"PERFORMANCE_METRICS_PUSHGATEWAY\\" (repo lub organizacja) z adresem Pushgateway"
              echo "- Możesz użyć domyślnego endpointu CI (np. org-level \\"CI_PUSHGATEWAY_DEFAULT\\")"
              echo "- Zweryfikuj dostępność poleceniem: curl -sf ${PUSHGATEWAY_URL:-<url>}/-/healthy"
              echo "- Upewnij się, że adres jest osiągalny (DNS/firewall) i odpowiada kodem 200"
            } >> "${GITHUB_STEP_SUMMARY}"
          }

          if [ -z "${PUSHGATEWAY_URL}" ]; then
            echo "PERFORMANCE_METRICS_PUSHGATEWAY not configured; failing to avoid missing performance metrics."
            summarize_failure
            exit 1
          fi

          gateway_target="${PUSHGATEWAY_URL%/}"
          if ! curl -sSf --retry 3 --retry-delay 2 --retry-connrefused --max-time 10 "${gateway_target}/-/healthy"; then
            echo "Pushgateway healthcheck failed at ${gateway_target}/-/healthy"
            summarize_failure
            exit 1
          fi

          echo "Pushgateway is reachable at ${gateway_target}; continuing with performance tests."

      - name: Run strategy backtesting benchmarks
        run: |
          python scripts/benchmark_backtesting.py \
            --manifest data/backtests/normalized/manifest.yaml \
            --output-dir reports/ci/benchmark_backtests \
            --regression-budget 0.10

      - name: Run backtest performance tests
        run: >-
          pytest
          tests/performance/test_backtest_throughput.py
          -m performance
          --disable-warnings

      - name: Upload backtest performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-backtests
          path: reports/ci/performance_backtests
          if-no-files-found: warn
          retention-days: 7

      - name: Upload strategy benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-backtest-benchmarks
          path: reports/ci/benchmark_backtests
          if-no-files-found: warn
          retention-days: 7

      - name: Run UI render performance tests
        run: >-
          pytest
          tests/performance/test_ui_render.py
          -m performance
          --disable-warnings

      - name: Upload UI render performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-ui-render
          path: reports/ci/performance_ui_render
          if-no-files-found: warn
          retention-days: 7

      - name: Persist benchmark history to Parquet/SQLite
        if: always()
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          python scripts/persist_performance_benchmarks.py \
            --report-root reports/ci/performance_backtests \
            --report-root reports/ci/performance_ui_render \
            --report-root reports/ci/benchmark_backtests \
            --parquet reports/ci/performance_history/performance_history.parquet \
            --sqlite reports/ci/performance_history/performance_history.sqlite \
            --window-size 120 \
            --default-git-commit "${GIT_COMMIT_SHA}"

      - name: Summarize performance metrics
        if: always()
        run: |
          found_reports=0
          while IFS= read -r -d '' report; do
            found_reports=1
            echo "::group::Performance summary: ${report}"
            jq '{file: $report, pairs_per_second: .pairs_per_second, p90_ms: (.p90_ms // .p90)}' \
              --arg report "${report}" "${report}"
            echo "::endgroup::"
          done < <(find reports/ci/performance_backtests reports/ci/performance_ui_render reports/ci/benchmark_backtests -type f -name "*.json" -print0 2>/dev/null)
          if [ "${found_reports}" -eq 0 ]; then
            echo "No performance report JSON files found."
          fi

      - name: Publish performance metrics
        if: always()
        env:
          PUSHGATEWAY_URL: ${{ secrets.PERFORMANCE_METRICS_PUSHGATEWAY || vars.PERFORMANCE_METRICS_PUSHGATEWAY || vars.CI_PUSHGATEWAY_DEFAULT }}
        run: |
          set -euo pipefail

          if [ "${METRICS_MODE:-strict}" != "strict" ]; then
            echo "Fallback mode (${METRICS_MODE_REASON:-unknown}) — skipping metrics push."
            {
              echo "### Pushgateway availability"
              echo ":warning: Tryb fallback — metryki nie zostały wypchnięte do Pushgateway."
              echo "- Powód: ${METRICS_MODE_REASON:-brak informacji}"
              echo "- Następstwa: artefakty z raportami JSON są dostępne, ale dashboardy Prometheus/Grafana nie otrzymają danych."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          summarize_failure() {
            {
              echo "### Pushgateway availability"
              echo ":x: Pushgateway nie jest skonfigurowany — publikacja metryk przerwana."
              echo "- Ustaw sekret/zmienną \"PERFORMANCE_METRICS_PUSHGATEWAY\" (repo lub organizacja) z adresem Pushgateway"
              echo "- Możesz użyć domyślnego endpointu CI (np. org-level \"CI_PUSHGATEWAY_DEFAULT\")"
            } >> "${GITHUB_STEP_SUMMARY}"
          }

          if [ -z "${PUSHGATEWAY_URL:-}" ]; then
            echo "PUSHGATEWAY_URL not set; failing to avoid missing performance metrics."
            summarize_failure
            exit 1
          fi

          payload_file="$(mktemp)"

          python - <<'PY' > "${payload_file}"
            import json
            import pathlib
            import sys

            report_roots = [
                pathlib.Path("reports/ci/performance_backtests"),
                pathlib.Path("reports/ci/performance_ui_render"),
                pathlib.Path("reports/ci/benchmark_backtests"),
            ]

            def escape_label(value: str) -> str:
                return (
                    value.replace("\\", "\\\\")
                    .replace("\n", "\\n")
                    .replace("\"", "\\\"")
                )

            def maybe_get(data: dict, key: str):
                value = data.get(key)
                return value if value is not None else None

            reports = []
            for root in report_roots:
                if root.exists():
                    reports.extend(sorted(root.rglob("*.json")))

            metrics = []
            for report_path in reports:
                with report_path.open("r", encoding="utf-8") as fh:
                    try:
                        payload = json.load(fh)
                    except json.JSONDecodeError as exc:
                        print(f"Skipping unreadable report {report_path}: {exc}", file=sys.stderr)
                        continue

                if "performance_backtests" in report_path.parts:
                    source = "backtest"
                elif "benchmark_backtests" in report_path.parts:
                    source = "backtest_benchmark"
                else:
                    source = "ui_render"
                labels_common = {
                    "source": source,
                    "dataset": str(payload.get("dataset", payload.get("scenario", "unknown"))),
                    "pair_count": str(payload.get("pair_count", "unknown")),
                    "timeframe": str(payload.get("timeframe", "unknown")),
                    "scenario": str(payload.get("scenario", "unknown")),
                    "git_commit": str(payload.get("git_commit", "unknown")),
                    "timestamp_utc": str(payload.get("timestamp_utc", "unknown")),
                }

                pairs_value = maybe_get(payload, "pairs_per_second")
                if pairs_value is not None:
                    metrics.append(("ci_performance_pairs_per_second", labels_common, pairs_value))

                p90_value = maybe_get(payload, "p90_ms")
                if p90_value is not None:
                    metrics.append(("ci_performance_p90_ms", labels_common, p90_value))

                avg_value = maybe_get(payload, "avg_ms")
                if avg_value is not None:
                    metrics.append(("ci_performance_avg_ms", labels_common, avg_value))

                bars_value = maybe_get(payload, "bars_per_second")
                if bars_value is not None:
                    metrics.append(("ci_performance_bars_per_second", labels_common, bars_value))

                p95_value = maybe_get(payload, "p95_ms")
                if p95_value is not None:
                    metrics.append(("ci_performance_p95_ms", labels_common, p95_value))

            if not metrics:
                sys.exit(0)

            print("# HELP ci_performance_pairs_per_second Backtest throughput (pairs/s)")
            print("# TYPE ci_performance_pairs_per_second gauge")
            print("# HELP ci_performance_p90_ms Performance p90 latency (ms)")
            print("# TYPE ci_performance_p90_ms gauge")
            print("# HELP ci_performance_avg_ms Performance avg latency (ms)")
            print("# TYPE ci_performance_avg_ms gauge")
            print("# HELP ci_performance_bars_per_second Strategy backtest throughput (bars/s)")
            print("# TYPE ci_performance_bars_per_second gauge")
            print("# HELP ci_performance_p95_ms Performance p95 latency (ms)")
            print("# TYPE ci_performance_p95_ms gauge")

            for metric_name, labels, value in metrics:
                rendered_labels = ",".join(
                    f"{key}=\"{escape_label(str(val))}\"" for key, val in labels.items()
                )
                print(f"{metric_name}{{{rendered_labels}}} {value}")
          PY

          if ! grep -q '^ci_performance_' "${payload_file}"; then
            echo "No performance metrics found to publish; skipping push."
            exit 0
          fi

          gateway_target="${PUSHGATEWAY_URL%/}"
          curl -sSf -X PUT --data-binary "@${payload_file}" "${gateway_target}/metrics/job/performance-benchmarks"

          {
            echo "### Pushgateway availability"
            echo ":white_check_mark: Tryb strict — metryki zostały opublikowane do Pushgateway (${gateway_target})."
            echo "- Dashboardy Prometheus/Grafana otrzymają dane z tego uruchomienia."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload performance history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmark-history
          path: |
            reports/ci/performance_history/performance_history.parquet
            reports/ci/performance_history/performance_history.sqlite
          if-no-files-found: warn
          retention-days: 14

  marketplace-catalog:
    name: Marketplace Catalog Packaging
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build marketplace catalog
        run: |
          python scripts/build_marketplace_catalog.py \
            --private-key config/marketplace/keys/dev-presets-ed25519.key \
            --key-id dev-presets \
            --signing-key dev-hmac:config/marketplace/keys/dev-hmac.key \
            --catalog-signature-key dev-hmac

      - name: Validate catalog metadata
        run: python scripts/marketplace_cli.py validate --key dev-hmac:config/marketplace/keys/dev-hmac.key

      - name: Run marketplace catalog tests
        run: pytest tests/test_marketplace_catalog.py --maxfail=1 --disable-warnings

      - name: Sync community reviews and client catalog
        run: |
          SIGNING_KEY=$(cat config/marketplace/keys/dev-hmac.key)
          python scripts/ui_marketplace_bridge.py \
            --presets-dir config/marketplace/presets \
            --licenses-path var/marketplace_licenses.json \
            --signing-key dev-hmac=$SIGNING_KEY \
            sync-reviews \
            --source-dir config/marketplace/reviews
          python scripts/marketplace_cli.py sync --source config/marketplace/catalog.json --force

      - name: Validate release bundle catalog
        run: |
          python scripts/build_release_bundle.py \
            --check-only \
            --require-clean \
            --catalog config/marketplace/catalog.json \
            --markdown config/marketplace/catalog.md \
            --packages config/marketplace/packages \
            --minimum-qa-strategies 15

      - name: Ensure repository is clean
        run: |
          git status --porcelain
          git diff --stat
          git diff --quiet

      - name: Upload marketplace packages
        if: always()
        run: |
          tar -czf marketplace-packages.tar.gz -C config/marketplace packages

      - name: Publish marketplace packages artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-packages
          path: marketplace-packages.tar.gz
          if-no-files-found: error
          retention-days: 3

  ui-packaging:
    name: UI Packaging
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Protobuf on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install protobuf
          echo "protobuf location: $(brew --prefix protobuf)"

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: 6.5.3
          modules: ${{ matrix.platform == 'windows' && env.QT_WINDOWS_MODULES || env.QT_DESKTOP_MODULES }}

      - name: Build Qt bundle
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python scripts/packaging/qt_bundle.py \
            --platform ${{ matrix.platform }} \
            --build-dir ui/build-${{ matrix.platform }} \
            --install-dir ui/install-${{ matrix.platform }} \
            --artifact-dir artifacts/ui/${{ matrix.platform }}

      - name: Upload UI bundle
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ matrix.platform }}
          path: artifacts/ui/${{ matrix.platform }}
          retention-days: 3

  deploy:
    name: Release marketplace assets
    runs-on: ubuntu-latest
    needs:
      - marketplace-catalog
      - ui-packaging
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build signed marketplace catalog
        run: |
          python scripts/build_marketplace_catalog.py \
            --private-key config/marketplace/keys/dev-presets-ed25519.key \
            --key-id dev-presets \
            --signing-key dev-hmac:config/marketplace/keys/dev-hmac.key \
            --catalog-signature-key dev-hmac

      - name: Synchronize installer marketplace bundle
        run: |
          python scripts/build_release_bundle.py \
            --catalog config/marketplace/catalog.json \
            --markdown config/marketplace/catalog.md \
            --packages config/marketplace/packages \
            --installer-root deploy/packaging/samples

      - name: Publish catalog release artefacts
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-catalog-release
          path: |
            config/marketplace/catalog.json
            config/marketplace/catalog.json.sig
            config/marketplace/catalog.md
            config/marketplace/catalog.md.sig
          if-no-files-found: error
          retention-days: 3
