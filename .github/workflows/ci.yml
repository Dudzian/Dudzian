name: CI
run-name: "CI (${{ github.event_name }}: ${{ github.ref_name }})"

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PYSIDE6_VERSION: "6.10.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  QT_DESKTOP_MODULES: "qtcharts"
  QT_WINDOWS_MODULES: "qtcharts qtshadertools qtimageformats"
  WHEELHOUSE_DIR: "wheelhouse"
  WHEELHOUSE_ENABLED: "true"

jobs:
  prepare-wheelhouse:
    name: Prepare wheelhouse
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Inspect pip configuration
        shell: bash
        run: |
          echo "HTTPS_PROXY=${HTTPS_PROXY:-}"
          echo "HTTP_PROXY=${HTTP_PROXY:-}"
          echo "PIP_INDEX_URL=${PIP_INDEX_URL:-}"
          echo "PIP_EXTRA_INDEX_URL=${PIP_EXTRA_INDEX_URL:-}"
          echo "NO_PROXY=${NO_PROXY:-}"
          python -m pip config debug -v

      - name: Build wheelhouse
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/build_wheelhouse.py \
            --wheelhouse "${WHEELHOUSE_DIR}" \
            --pyside6-version "${PYSIDE6_VERSION}" \
            --only-binary :all:

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-files-found: error
          retention-days: 7

  lint-and-test:
    if: github.event_name != 'schedule'
    name: Lint and Test
    runs-on: windows-latest
    needs: prepare-wheelhouse
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            pytest_cov_stub.py

      - name: Download wheelhouse
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- .[dev]
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- pre-commit

      - name: Verify PyYAML availability for runtime tests
        shell: bash
        run: |
          python - <<'PY'
          import yaml
          print(f"PyYAML available: {getattr(yaml, '__version__', 'unknown')}")
          PY

      - name: Preflight test environment
        shell: pwsh
        run: |
          python scripts/ci/preflight_test_env.py

      - name: "Lint (pre-commit: ruff + mypy)"
        shell: bash
        run: |
          python -m pre_commit run --all-files --show-diff-on-failure

      - name: Prepare test reports directory
        shell: bash
        run: mkdir -p test-results

      - name: Pytest (unit suite) with coverage
        shell: bash
        run: >-
          python -m pytest
          --cov=bot_core.runtime.multi_strategy_scheduler
          --cov=bot_core.runtime.journal
          --cov=bot_core.strategies.base
          --cov=bot_core.strategies.market_params
          --cov=bot_core.strategies._volatility
          --cov=bot_core.strategies.daily_trend
          --cov=bot_core.strategies.day_trading
          --cov=bot_core.strategies.mean_reversion
          --cov=bot_core.strategies.volatility_target
          --cov=bot_core.strategies.futures_spread
          --cov=bot_core.strategies.cross_exchange_arbitrage
          --cov=bot_core.strategies.cross_exchange_hedge
          --cov=bot_core.strategies.regime_workflow
          --cov-config=.coveragerc
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=75
          --junitxml=test-results/pytest-unit.xml
          tests/test_pipeline_paper.py
          tests/test_risk_profiles.py
          tests/test_mean_reversion_strategy.py
          tests/test_volatility_target_strategy.py
          tests/test_cross_exchange_arbitrage_strategy.py
          tests/test_multi_strategy_scheduler.py
          tests/test_backtest_dataset_library.py
          tests/test_telemetry_risk_profiles.py
          tests/test_trading_decision_journal.py
          tests/test_smoke_demo_strategies_cli.py
          tests/runtime/test_stage6_hypercare_cycle_runtime.py
          tests/runtime/test_multi_strategy_scheduler_async.py
          tests/test_journal_analysis.py
          tests/test_journal_aggregation.py
          tests/strategies/test_regime_workflow.py
          tests/strategies/test_day_trading_strategy.py
          tests/test_futures_spread_strategy.py
          tests/test_cross_exchange_hedge_strategy.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 3

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-and-test-pytest-results
          path: test-results
          if-no-files-found: warn
          retention-days: 3

  licensing-hwid-tolerance:
    if: github.event_name != 'schedule'
    name: Licensing HWID Tolerance
    runs-on: windows-latest
    needs: prepare-wheelhouse
    env:
      PYTHONHASHSEED: "0"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      LICENSING_HWID_LOG: reports/ci/licensing_hwid/pytest.log
      LICENSING_HWID_JUNIT: reports/ci/licensing_hwid/pytest.xml
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$env:WHEELHOUSE_DIR" --require-wheelhouse -- .[test]

      - name: Preflight test environment
        shell: pwsh
        run: |
          python scripts/ci/preflight_test_env.py

      - name: Run HWID tolerance tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force (Split-Path -Parent $env:LICENSING_HWID_LOG) | Out-Null
          python -m pytest tests/licensing/test_hwid_drift.py `
            --maxfail=1 `
            --disable-warnings `
            --junitxml $env:LICENSING_HWID_JUNIT `
            --color=yes `
            -q 2>&1 | Tee-Object -FilePath $env:LICENSING_HWID_LOG
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload HWID tolerance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: licensing-hwid-tolerance
          path: |
            reports/ci/licensing_hwid/pytest.log
            reports/ci/licensing_hwid/pytest.xml
          if-no-files-found: warn

  mypy-core:
    if: github.event_name != 'schedule'
    name: Mypy (core packages)
    runs-on: windows-latest
    needs: prepare-wheelhouse
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- .[dev]
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- mypy

      - name: Run mypy for core packages
        run: python -m mypy

  release-quality-gates:
    if: github.event_name != 'schedule'
    name: Release Quality Gates
    runs-on: ubuntu-latest
    needs: prepare-wheelhouse
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download wheelhouse
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Install system dependencies for UI tests
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libpulse0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          bash scripts/ci/install_deps_python.sh

      - name: Install mypy
        shell: bash
        run: |
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- mypy

      - name: Preflight test environment
        shell: bash
        run: |
          python scripts/ci/preflight_test_env.py

      - name: Type check with mypy
        run: mypy

      - name: Pytest demo→paper scenario
        run: python -m pytest -m e2e_demo_paper --maxfail=1 --disable-warnings

      - name: Pytest paper execution smoke
        run: python -m pytest tests/test_paper_execution.py

      - name: Pytest execution router integrations
        run: python -m pytest tests/integration/test_execution_router_failover.py

  py-tests-windows:
    if: github.event_name != 'schedule'
    name: Python tests (Windows)
    runs-on: windows-latest
    needs: prepare-wheelhouse
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download wheelhouse
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          bash scripts/ci/install_deps_python.sh

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Preflight test environment
        shell: pwsh
        run: |
          python scripts/ci/preflight_test_env.py

      - name: Run fast pytest suite
        shell: bash
        env:
          PYTEST_FAST: "1"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          DUDZIAN_TEST_MODE: "1"
          DUDZIAN_ALLOW_LONG_POLL: "0"
        run: |
          mkdir -p test-results
          python -m pytest \
            --fast \
            -m "not integration and not e2e_demo_paper and not retraining and not soak and not performance and not qml" \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            --ignore=tests/performance \
            --ignore=tests/ui_pyside \
            --ignore=tests/ui_backend \
            --maxfail=1 \
            --durations=10 \
            --junitxml=test-results/pytest.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bot-core-pytest-results
          path: test-results/pytest.xml
          retention-days: 3

      - name: Generate champion diff audit report
        if: always()
        run: >-
          python -m scripts.audit.champion_diff
          --lhs deploy/packaging/samples/var/models/quality
          --rhs var/models/quality
          --output-dir audit/champion_diffs_ci
          --tag ci

      - name: Upload champion diff audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: champion-quality-diff
          path: audit/champion_diffs_ci
          if-no-files-found: warn
          retention-days: 3

  py-tests-ubuntu:
    if: github.event_name != 'schedule'
    name: Python tests (Ubuntu)
    runs-on: ubuntu-latest
    needs: prepare-wheelhouse
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download wheelhouse
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          bash scripts/ci/install_deps_python.sh

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Preflight test environment
        shell: bash
        run: |
          python scripts/ci/preflight_test_env.py

      - name: Run fast pytest suite
        env:
          PYTEST_FAST: "1"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          DUDZIAN_TEST_MODE: "1"
          DUDZIAN_ALLOW_LONG_POLL: "0"
        run: |
          mkdir -p test-results
          python -m pytest \
            --fast \
            -m "not integration and not e2e_demo_paper and not retraining and not soak and not performance and not qml" \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            --ignore=tests/performance \
            --ignore=tests/ui_pyside \
            --ignore=tests/ui_backend \
            --maxfail=1 \
            --durations=10 \
            --junitxml=test-results/pytest.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: py-tests-ubuntu-pytest-results
          path: test-results/pytest.xml
          retention-days: 3

  py-tests-macos:
    if: github.event_name != 'schedule'
    name: Python tests (macOS)
    runs-on: macos-latest
    needs: prepare-wheelhouse
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Install dependencies
        shell: bash
        run: |
          bash scripts/ci/install_deps_python.sh

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Preflight test environment
        shell: bash
        run: |
          python scripts/ci/preflight_test_env.py

      - name: Run fast pytest suite
        env:
          PYTEST_FAST: "1"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          DUDZIAN_TEST_MODE: "1"
          DUDZIAN_ALLOW_LONG_POLL: "0"
        run: |
          mkdir -p test-results
          python -m pytest \
            --fast \
            -m "not integration and not e2e_demo_paper and not retraining and not soak and not performance and not qml" \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            --ignore=tests/performance \
            --ignore=tests/ui_pyside \
            --ignore=tests/ui_backend \
            --maxfail=1 \
            --durations=10 \
            --junitxml=test-results/pytest.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: py-tests-macos-pytest-results
          path: test-results/pytest.xml
          retention-days: 3

  loopback-e2e:
    if: github.event_name != 'schedule'
    name: Loopback E2E
    runs-on: ubuntu-latest
    needs: py-tests-windows
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Run loopback tests via Docker Compose
        shell: bash
        run: |
          mkdir -p loopback-logs
          docker compose -f deploy/compose/loopback-tests.yml down -v --remove-orphans || true
          docker compose -f deploy/compose/loopback-tests.yml up \
            --abort-on-container-exit \
            --force-recreate \
            --renew-anon-volumes \
            --remove-orphans \
            2>&1 | tee loopback-logs/compose.log
          exit ${PIPESTATUS[0]}

      - name: Collect loopback diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p loopback-logs
          docker compose -f deploy/compose/loopback-tests.yml ps -a > loopback-logs/compose-ps.txt
          docker compose -f deploy/compose/loopback-tests.yml logs --no-color > loopback-logs/compose-services.log

      - name: Upload loopback artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: loopback-e2e-logs
          path: loopback-logs
          if-no-files-found: warn
          retention-days: 5

      - name: Tear down loopback compose
        if: always()
        run: docker compose -f deploy/compose/loopback-tests.yml down -v --remove-orphans

  exchange-report:
    if: github.event_name != 'schedule'
    name: Exchange HyperCare Report
    runs-on: ubuntu-latest
    needs: [prepare-wheelhouse, lint-and-test]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-Linux-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- .[test,tools]
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- \
            "PySide6==${PYSIDE6_VERSION}" \
            "PySide6_Addons==${PYSIDE6_VERSION}" \
            "PySide6_Essentials==${PYSIDE6_VERSION}" \
            "shiboken6==${PYSIDE6_VERSION}"

      - name: Set long-poll freshness thresholds
        run: |
          python - <<"PY"
          import os
          from bot_core.config.long_poll import (
              LONG_POLL_FUTURE_GRACE_MINUTES,
              LONG_POLL_MAX_AGE_MINUTES,
          )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as env_file:
              env_file.write(f"LONG_POLL_MAX_AGE_MINUTES={LONG_POLL_MAX_AGE_MINUTES}\n")
              env_file.write(
                  f"LONG_POLL_FUTURE_GRACE_MINUTES={LONG_POLL_FUTURE_GRACE_MINUTES}\n"
              )
          PY

      - name: Validate long-poll snapshots
        run: |
          python scripts/validate_long_poll_snapshots.py \
            --input var/metrics/long_poll_snapshots.json \
            --output var/metrics/long_poll_snapshots.json \
            --max-age-minutes "${LONG_POLL_MAX_AGE_MINUTES}" \
            --future-grace-minutes "${LONG_POLL_FUTURE_GRACE_MINUTES}" \
            --skip-freshness

      - name: Generate exchange adapter report
        run: |
          REPORT_DATE=$(date +%Y-%m-%d)
          python scripts/list_exchange_adapters.py \
            --report-date "${REPORT_DATE}" \
            --report-dir reports/exchanges \
            --push-dashboard \
            --dashboard-dir reports/exchanges/signal_quality \
            --hypercare-config config/stage6/hypercare.yaml \
            --hypercare-dir reports/exchanges/hypercare \
            --daily-csv-dir reports/exchanges \
            --long-poll-metrics var/metrics/long_poll_snapshots.json \
            --long-poll-ttl-minutes "${LONG_POLL_MAX_AGE_MINUTES}" \
            --generate-hypercare-assets \
            --allow-stale-long-poll

      - name: Inspect signal quality snapshots
        run: ls -l reports/exchanges/signal_quality

      - name: Upload exchange report snapshot
        uses: actions/upload-artifact@v6
        with:
          name: exchange-report
          path: |
            reports/exchanges
            reports/exchanges/signal_quality
          retention-days: 3

      - name: Tear down compose
        if: always()
        run: docker compose -f deploy/compose/loopback-tests.yml down -v

  marketing-bundle-parity:
    if: github.event_name != 'schedule' && github.actor != 'dependabot[bot]' && ((github.event_name != 'pull_request' && github.event_name != 'pull_request_target') || github.event.pull_request.head.repo.full_name == github.repository)
    name: Marketing bundle parity
    runs-on: ubuntu-latest
    needs: exchange-report
    permissions:
      contents: read
      actions: read
    env:
      MIRROR_S3_URI: ${{ secrets.MARKETING_PARITY_MIRROR_S3 || vars.MARKETING_PARITY_MIRROR_S3 }}
      MIRROR_GIT_REPO: ${{ secrets.MARKETING_PARITY_MIRROR_GIT || vars.MARKETING_PARITY_MIRROR_GIT }}
      MIRROR_SUBPATH: ${{ vars.MARKETING_PARITY_MIRROR_SUBPATH }}
      # Marketing parity is strict only when explicitly enabled via MARKETING_PARITY_REQUIRE_MIRROR=true.
      MIRROR_REQUIRED: ${{ vars.MARKETING_PARITY_REQUIRE_MIRROR || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-Linux-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- .[tools]
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- \
            "PySide6==${PYSIDE6_VERSION}" \
            "PySide6_Addons==${PYSIDE6_VERSION}" \
            "PySide6_Essentials==${PYSIDE6_VERSION}" \
            "shiboken6==${PYSIDE6_VERSION}"

      - name: Download exchange report artefact
        uses: actions/download-artifact@v7
        with:
          name: exchange-report
          path: artifacts/exchange-report

      - name: Download latest Stress Lab artefact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ github.token }}
          repo: ${{ github.repository }}
          workflow: stress-lab-report.yml
          workflow_conclusion: success
          branch: ${{ github.event.pull_request.base.ref || github.ref_name }}
          name: stress-lab-report
          if_no_artifact_found: fail
          path: artifacts/stress-lab-report

      - name: Sync mirror from S3
        if: env.MIRROR_S3_URI != ''
        run: |
          aws s3 sync "${MIRROR_S3_URI}" mirror --exact-timestamps
          echo "MIRROR_ROOT=mirror/${MIRROR_SUBPATH:-benchmark}" >> "$GITHUB_ENV"

      - name: Clone mirror Git repository
        if: env.MIRROR_S3_URI == '' && env.MIRROR_GIT_REPO != ''
        run: |
          git clone --depth=1 "${MIRROR_GIT_REPO}" mirror_git
          echo "MIRROR_ROOT=mirror_git/${MIRROR_SUBPATH:-benchmark}" >> "$GITHUB_ENV"

      - name: Ensure mirror location configured
        run: |
          if [ -z "${MIRROR_ROOT:-}" ]; then
            if [ "${MIRROR_REQUIRED}" = "true" ]; then
              echo "::error::Mirror location not configured. Configure MARKETING_PARITY_MIRROR_S3 or MARKETING_PARITY_MIRROR_GIT to run parity validation."
            else
              echo "::warning::Mirror location not configured. Skipping parity validation because MARKETING_PARITY_MIRROR_S3 and MARKETING_PARITY_MIRROR_GIT are both empty."
            fi
            if [ -n "${MIRROR_S3_URI:-}" ]; then
              echo "MIRROR_S3_URI=[set] (len=${#MIRROR_S3_URI})" >&2
            else
              echo "MIRROR_S3_URI=[empty]" >&2
            fi
            if [ -n "${MIRROR_GIT_REPO:-}" ]; then
              echo "MIRROR_GIT_REPO=[set] (len=${#MIRROR_GIT_REPO})" >&2
            else
              echo "MIRROR_GIT_REPO=[empty]" >&2
            fi
            echo "MIRROR_SUBPATH='${MIRROR_SUBPATH:-benchmark}'" >&2

            python -m scripts.audit.marketing_parity_skip_report \
              --audit-output docs/audit/marketing_parity_report.md \
              --json-output docs/audit/marketing_parity_report.json \
              --reason mirror_not_configured

            if [ "${MIRROR_REQUIRED}" = "true" ]; then
              exit 1
            fi
          fi

      - name: Validate marketing bundle parity
        if: env.MIRROR_ROOT != ''
        run: |
          python -m scripts.audit.marketing_parity_check \
            --stress-lab-dir artifacts/stress-lab-report/reports/stress_lab \
            --signal-quality-index artifacts/exchange-report/reports/exchanges/signal_quality/index.csv \
            --mirror-dir "${MIRROR_ROOT}" \
            --audit-output docs/audit/marketing_parity_report.md \
            --json-output docs/audit/marketing_parity_report.json

      - name: Upload parity audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: marketing-parity-report
          path: |
            docs/audit/marketing_parity_report.md
            docs/audit/marketing_parity_report.json
          if-no-files-found: error

  ui-ctest:
    if: github.event_name != 'schedule'
    name: UI Native Tests
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
      CTEST_OUTPUT_ON_FAILURE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config \
            libprotobuf-dev protobuf-compiler protobuf-compiler-grpc \
            libgrpc-dev libgrpc++-dev libarchive-dev \
            libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 xvfb

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.PYSIDE6_VERSION }}
          modules: qtcharts

      - name: Install Python runtime dependencies for UI bridges
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyyaml

      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb "$DISPLAY" -screen 0 1920x1080x24 > /tmp/xvfb.log 2>&1 &
          echo "DISPLAY=${DISPLAY}" >> "$GITHUB_ENV"
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          sleep 3

      - name: Configure CMake
        run: cmake -S ui -B ui/build-tests -G Ninja -DBUILD_TESTING=ON -DCMAKE_PREFIX_PATH=$Qt6_DIR

      - name: Build UI tests
        run: cmake --build ui/build-tests

      - name: Run UI test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -o pipefail
          mkdir -p ui/build-tests/Testing/Temporary
          ctest --test-dir ui/build-tests --output-on-failure --output-log ui/build-tests/Testing/Temporary/ctest.log | tee ui/build-tests/Testing/Temporary/ctest-console.log

      - name: Upload UI native test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-native-test-artifacts
          path: |
            ui/build-tests/Testing/Temporary/ctest.log
            ui/build-tests/Testing/Temporary/ctest-console.log
            ui/build-tests/Testing/Temporary/LastTest.log
          if-no-files-found: warn
          retention-days: 5

      - name: Stop virtual display
        if: always()
        run: |
          if [[ -n "${XVFB_PID:-}" ]]; then
            kill "$XVFB_PID" || true
          fi

