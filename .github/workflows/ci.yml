name: CI
run-name: "CI (${{ github.event_name }}: ${{ github.ref_name }})"

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  PYSIDE6_VERSION: "6.7.0"
  QT_DESKTOP_MODULES: "qtcharts qtdeclarative qtquickcontrols2"
  QT_WINDOWS_MODULES: "qtcharts qtdeclarative qtquickcontrols2 qtshadertools qtimageformats"

jobs:
  # Source of truth: builds or fetches wheelhouse artifacts consumed by downstream jobs.
  prepare-wheelhouse:
    name: Prepare wheelhouse
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
        (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/stable' || github.ref == 'refs/heads/main'))
    timeout-minutes: 25
    outputs:
      wheelhouse_source: ${{ steps.wheelhouse-plan.outputs.wheelhouse_source }}
      wheelhouse_dir: ${{ steps.wheelhouse-plan.outputs.wheelhouse_dir }}
      wheelhouse_artifact: ${{ steps.wheelhouse-plan.outputs.wheelhouse_artifact }}
      wheelhouse_enabled: ${{ steps.wheelhouse-plan.outputs.wheelhouse_enabled }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide wheelhouse strategy
        id: wheelhouse-plan
        shell: bash
        env:
          PY_VERSION: ${{ steps.setup-python.outputs.python-version }}
        run: |
          # Single decision point: choose how wheelhouse is sourced in this workflow run.
          source="${WHEELHOUSE_SOURCE:-build}"
          wheelhouse_dir="${WHEELHOUSE_DIR:-wheelhouse}"
          artifact_name="${WHEELHOUSE_ARTIFACT_NAME:-wheelhouse-${{ runner.os }}-py${PY_VERSION}}"
          wheelhouse_enabled=true

          case "${source}" in
            build)
              echo "Planning to build wheelhouse into ${wheelhouse_dir} and upload as ${artifact_name}."
              ;;
            artifact)
              # Artifact mode requires the producing run id so we download a known wheelhouse snapshot.
              if [[ -z "${WHEELHOUSE_RUN_ID:-}" ]]; then
                echo "WHEELHOUSE_RUN_ID must be set when WHEELHOUSE_SOURCE=artifact" >&2
                exit 1
              fi
              echo "Planning to download wheelhouse artifact ${artifact_name} (run ${WHEELHOUSE_RUN_ID})."
              ;;
            skip)
              # Skip mode disables wheelhouse usage for downstream jobs.
              wheelhouse_dir=""
              artifact_name=""
              wheelhouse_enabled=false
              echo "Wheelhouse handling disabled (WHEELHOUSE_SOURCE=skip)."
              ;;
            *)
              echo "Invalid WHEELHOUSE_SOURCE: ${source} (expected build|artifact|skip)" >&2
              exit 1
              ;;
          esac

          echo "wheelhouse_source=${source}" >> "$GITHUB_OUTPUT"
          echo "wheelhouse_dir=${wheelhouse_dir}" >> "$GITHUB_OUTPUT"
          echo "wheelhouse_artifact=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "wheelhouse_enabled=${wheelhouse_enabled}" >> "$GITHUB_OUTPUT"

      - name: Inspect pip configuration
        shell: bash
        run: |
          echo "HTTPS_PROXY=${HTTPS_PROXY:-}"
          echo "HTTP_PROXY=${HTTP_PROXY:-}"
          echo "PIP_INDEX_URL=${PIP_INDEX_URL:-}"
          echo "PIP_EXTRA_INDEX_URL=${PIP_EXTRA_INDEX_URL:-}"
          echo "NO_PROXY=${NO_PROXY:-}"
          python -m pip config debug -v

      - name: Build wheelhouse
        if: steps.wheelhouse-plan.outputs.wheelhouse_source == 'build'
        shell: bash
        env:
          WHEELHOUSE_DIR: ${{ steps.wheelhouse-plan.outputs.wheelhouse_dir }}
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/build_wheelhouse.py \
            --wheelhouse "${WHEELHOUSE_DIR}" \
            --pyside6-version "${PYSIDE6_VERSION}" \
            --only-binary :all:

      - name: Download existing wheelhouse artifact
        if: steps.wheelhouse-plan.outputs.wheelhouse_source == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.wheelhouse-plan.outputs.wheelhouse_artifact }}
          path: ${{ steps.wheelhouse-plan.outputs.wheelhouse_dir }}
          run-id: ${{ env.WHEELHOUSE_RUN_ID }}
          if-no-artifact-found: error

      - name: Upload wheelhouse artifact
        if: steps.wheelhouse-plan.outputs.wheelhouse_source == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.wheelhouse-plan.outputs.wheelhouse_artifact }}
          path: ${{ steps.wheelhouse-plan.outputs.wheelhouse_dir }}
          if-no-files-found: error
          retention-days: 7

  lint-and-test:
    name: Lint and Test
    runs-on: [self-hosted, windows]
    needs: prepare-wheelhouse
    env:
      WHEELHOUSE_DIR: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_dir }}
      WHEELHOUSE_SOURCE: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_source }}
      WHEELHOUSE_ARTIFACT: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_artifact }}
      WHEELHOUSE_ENABLED: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_enabled }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine pip cache directory
        id: pip-cache
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          cache_dir = subprocess.check_output(["python", "-m", "pip", "cache", "dir"], text=True).strip()
          print(f"cache_dir={cache_dir}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"cache_dir={cache_dir}\n")
          PY

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.cache_dir }}
          key: ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt', 'pytest_cov_stub.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-

      # Wheelhouse consumer: expects artifact from prepare-wheelhouse.
      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      # Quick structural lint: ensures repo path casing/length expectations are met.
      # Local: python scripts/lint_paths.py
      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          wheelhouse_args=()
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            wheelhouse_args+=(--wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse)
          fi
          python scripts/ci/pip_install.py "${wheelhouse_args[@]}" -- .[dev]
          python scripts/ci/pip_install.py "${wheelhouse_args[@]}" -- pytest pytest-cov pre-commit

      # Full lint suite via pre-commit: runs ruff + mypy just like local `pre-commit run --all-files`.
      # Local: pre-commit run --all-files --show-diff-on-failure
      - name: "Lint (pre-commit: ruff + mypy)"
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Prepare test reports directory
        shell: bash
        run: mkdir -p test-results

      # Unit tests with coverage and JUnit output; replicate locally with the same pytest command.
      # Local: pytest --cov=bot_core.strategies --cov=bot_core.runtime.multi_strategy_scheduler --cov=bot_core.runtime.journal \
      #   --cov-config=.coveragerc --cov-report=xml --cov-report=term --cov-fail-under=75 tests/... (list below)
      - name: Pytest (unit suite) with coverage
        run: >-
          pytest
          --cov=bot_core.strategies
          --cov=bot_core.runtime.multi_strategy_scheduler
          --cov=bot_core.runtime.journal
          --cov-config=.coveragerc
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=75
          --junitxml=test-results/pytest-unit.xml
          tests/test_pipeline_paper.py
          tests/test_risk_profiles.py
          tests/test_mean_reversion_strategy.py
          tests/test_volatility_target_strategy.py
          tests/test_cross_exchange_arbitrage_strategy.py
          tests/test_multi_strategy_scheduler.py
          tests/test_backtest_dataset_library.py
          tests/test_telemetry_risk_profiles.py
          tests/test_trading_decision_journal.py
          tests/test_smoke_demo_strategies_cli.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 3

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-and-test-pytest-results
          path: test-results
          if-no-files-found: warn
          retention-days: 3

  licensing-hwid-tolerance:
    name: Licensing HWID Tolerance
    runs-on: [self-hosted, windows]
    env:
      PYTHONHASHSEED: "0"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      LICENSING_HWID_LOG: reports/ci/licensing_hwid/pytest.log
      LICENSING_HWID_JUNIT: reports/ci/licensing_hwid/pytest.xml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run HWID tolerance tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$(dirname "${LICENSING_HWID_LOG}")"
          pytest tests/licensing/test_hwid_drift.py \
            --maxfail=1 \
            --disable-warnings \
            --junitxml "${LICENSING_HWID_JUNIT}" \
            --color=yes \
            -q 2>&1 | tee "${LICENSING_HWID_LOG}"

      - name: Upload HWID tolerance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: licensing-hwid-tolerance
          path: |
            ${LICENSING_HWID_LOG}
            ${LICENSING_HWID_JUNIT}
          if-no-files-found: warn

  mypy-core:
    name: Mypy (core packages)
    runs-on: [self-hosted, windows]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install mypy

      - name: Run mypy for core packages
        run: python -m mypy

  release-quality-gates:
    name: Release Quality Gates
    runs-on: ubuntu-latest
    needs: prepare-wheelhouse
    env:
      WHEELHOUSE_DIR: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_dir }}
      WHEELHOUSE_SOURCE: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_source }}
      WHEELHOUSE_ARTIFACT: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_artifact }}
      WHEELHOUSE_ENABLED: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_enabled }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Wheelhouse consumer: uses artifact produced in prepare-wheelhouse.
      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Install system dependencies for UI tests
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libpulse0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          wheelhouse_args=()
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            wheelhouse_args+=(--wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse)
          fi
          python scripts/ci/pip_install.py "${wheelhouse_args[@]}" -- .[dev]

      - name: Install mypy
        shell: bash
        run: |
          wheelhouse_args=()
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            wheelhouse_args+=(--wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse)
          fi
          python scripts/ci/pip_install.py "${wheelhouse_args[@]}" -- mypy

      - name: Type check with mypy
        run: mypy

      - name: Pytest demo→paper scenario
        run: pytest -m e2e_demo_paper --maxfail=1 --disable-warnings

      - name: Pytest paper execution smoke
        run: pytest tests/test_paper_execution.py

      - name: Pytest execution router integrations
        run: pytest tests/integration/test_execution_router_failover.py

  bot-core-fast-tests:
    name: Bot Core Fast Tests
    runs-on: [self-hosted, windows]
    needs: prepare-wheelhouse
    timeout-minutes: 25
    env:
      WHEELHOUSE_DIR: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_dir }}
      WHEELHOUSE_SOURCE: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_source }}
      WHEELHOUSE_ARTIFACT: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_artifact }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Wheelhouse consumer: uses artifact produced in prepare-wheelhouse.
      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          wheelhouse_args=()
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            wheelhouse_args+=(--wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse)
          fi
          python scripts/ci/pip_install.py "${wheelhouse_args[@]}" -- .[dev]

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Run fast pytest suite
        env:
          PYTEST_FAST: "1"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          mkdir -p test-results
          pytest \
            --fast \
            -m "not integration and not e2e_demo_paper and not retraining and not soak and not performance" \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            --maxfail=1 \
            --durations=10 \
            --junitxml=test-results/pytest.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-core-pytest-results
          path: test-results/pytest.xml
          retention-days: 3

      - name: Generate champion diff audit report
        if: always()
        run: >-
          python -m scripts.audit.champion_diff
          --lhs deploy/packaging/samples/var/models/quality
          --rhs var/models/quality
          --output-dir audit/champion_diffs_ci
          --tag ci

      - name: Upload champion diff audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: champion-quality-diff
          path: audit/champion_diffs_ci
          if-no-files-found: warn
          retention-days: 3

  loopback-e2e:
    name: Loopback E2E
    runs-on: ubuntu-latest
    needs: bot-core-fast-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run loopback tests via Docker Compose
        shell: bash
        run: |
          mkdir -p loopback-logs
          docker compose -f deploy/compose/loopback-tests.yml down -v --remove-orphans || true
          docker compose -f deploy/compose/loopback-tests.yml up \
            --abort-on-container-exit \
            --force-recreate \
            --renew-anon-volumes \
            --remove-orphans \
            2>&1 | tee loopback-logs/compose.log
          exit ${PIPESTATUS[0]}

      - name: Collect loopback diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p loopback-logs
          docker compose -f deploy/compose/loopback-tests.yml ps -a > loopback-logs/compose-ps.txt
          docker compose -f deploy/compose/loopback-tests.yml logs --no-color > loopback-logs/compose-services.log

      - name: Upload loopback artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loopback-e2e-logs
          path: loopback-logs
          if-no-files-found: warn
          retention-days: 5

      - name: Tear down loopback compose
        if: always()
        run: docker compose -f deploy/compose/loopback-tests.yml down -v --remove-orphans

  exchange-report:
    name: Exchange HyperCare Report
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint repository paths
        run: python scripts/lint_paths.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Generate exchange adapter report
        run: |
          REPORT_DATE=$(date +%Y-%m-%d)
          python scripts/list_exchange_adapters.py \
            --report-date "${REPORT_DATE}" \
            --report-dir reports/exchanges \
            --push-dashboard \
            --dashboard-dir reports/exchanges/signal_quality \
            --hypercare-config config/stage6/hypercare.yaml \
            --hypercare-dir reports/exchanges/hypercare \
            --daily-csv-dir reports/exchanges \
            --long-poll-metrics var/metrics/long_poll_snapshots.json \
            --generate-hypercare-assets

      - name: Inspect signal quality snapshots
        run: ls -l reports/exchanges/signal_quality

      - name: Upload exchange report snapshot
        uses: actions/upload-artifact@v4
        with:
          name: exchange-report
          path: |
            reports/exchanges
            reports/exchanges/signal_quality
          retention-days: 3

      - name: Tear down compose
        if: always()
        run: docker compose -f deploy/compose/loopback-tests.yml down -v

  marketing-bundle-parity:
    name: Marketing bundle parity
    runs-on: ubuntu-latest
    needs: exchange-report
    env:
      MIRROR_S3_URI: ${{ secrets.MARKETING_PARITY_MIRROR_S3 || vars.MARKETING_PARITY_MIRROR_S3 }}
      MIRROR_GIT_REPO: ${{ secrets.MARKETING_PARITY_MIRROR_GIT || vars.MARKETING_PARITY_MIRROR_GIT }}
      MIRROR_SUBPATH: ${{ vars.MARKETING_PARITY_MIRROR_SUBPATH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Download exchange report artefact
        uses: actions/download-artifact@v4
        with:
          name: exchange-report
          path: artifacts/exchange-report

      - name: Download latest Stress Lab artefact
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: stress-lab-report.yml
          name: stress-lab-report
          branch: ${{ github.event.pull_request.base.ref || github.ref_name }}
          repo: ${{ github.repository }}
          path: artifacts/stress-lab-report

      - name: Sync mirror from S3
        if: env.MIRROR_S3_URI != ''
        run: |
          aws s3 sync "${MIRROR_S3_URI}" mirror --exact-timestamps
          echo "MIRROR_ROOT=mirror/${MIRROR_SUBPATH:-benchmark}" >> "$GITHUB_ENV"

      - name: Clone mirror Git repository
        if: env.MIRROR_S3_URI == '' && env.MIRROR_GIT_REPO != ''
        run: |
          git clone --depth=1 "${MIRROR_GIT_REPO}" mirror_git
          echo "MIRROR_ROOT=mirror_git/${MIRROR_SUBPATH:-benchmark}" >> "$GITHUB_ENV"

      - name: Ensure mirror location configured
        run: |
          if [ -z "${MIRROR_ROOT}" ]; then
            echo "Mirror location not configured; set MARKETING_PARITY_MIRROR_S3 or MARKETING_PARITY_MIRROR_GIT." >&2
            exit 1
          fi
        env:
          MIRROR_ROOT: ${{ env.MIRROR_ROOT }}

      - name: Validate marketing bundle parity
        run: |
          python -m scripts.audit.marketing_parity_check \
            --stress-lab-dir artifacts/stress-lab-report/reports/stress_lab \
            --signal-quality-index artifacts/exchange-report/reports/exchanges/signal_quality/index.csv \
            --mirror-dir "${MIRROR_ROOT}" \
            --audit-output docs/audit/marketing_parity_report.md \
            --json-output docs/audit/marketing_parity_report.json

      - name: Upload parity audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-parity-report
          path: |
            docs/audit/marketing_parity_report.md
            docs/audit/marketing_parity_report.json
          if-no-files-found: error

  ui-ctest:
    name: UI Native Tests
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config \
            libprotobuf-dev protobuf-compiler protobuf-compiler-grpc \
            libgrpc-dev libgrpc++-dev libarchive-dev \
            libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 xvfb

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: 6.7.0
          modules: ${{ env.QT_DESKTOP_MODULES }}

      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb "$DISPLAY" -screen 0 1920x1080x24 > /tmp/xvfb.log 2>&1 &
          echo "DISPLAY=${DISPLAY}" >> "$GITHUB_ENV"
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          # Give Xvfb a moment to become ready.
          sleep 3

      - name: Configure CMake
        run: cmake -S ui -B ui/build-tests -G Ninja -DBUILD_TESTING=ON -DCMAKE_PREFIX_PATH=$Qt6_DIR

      - name: Build UI tests
        run: cmake --build ui/build-tests

      - name: Run UI test suite
        run: |
          set -o pipefail
          mkdir -p ui/build-tests/Testing/Temporary
          ctest --test-dir ui/build-tests --output-on-failure --output-log ui/build-tests/Testing/Temporary/ctest.log | tee ui/build-tests/Testing/Temporary/ctest-console.log

      - name: Upload UI native test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-native-test-artifacts
          path: |
            ui/build-tests/Testing/Temporary/ctest.log
            ui/build-tests/Testing/Temporary/ctest-console.log
            ui/build-tests/Testing/Temporary/LastTest.log
          if-no-files-found: warn
          retention-days: 5

      - name: Stop virtual display
        if: always()
        run: |
          if [[ -n "${XVFB_PID:-}" ]]; then
            kill "$XVFB_PID" || true
          fi

  ui-tests:
    name: UI QML Tests
    runs-on: ubuntu-latest
    needs: prepare-wheelhouse
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
      PYTEST_REQUIRE_QML: "1"
      QML_DIAGNOSTICS_DIR: test-results/qml
      WHEELHOUSE_DIR: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_dir }}
      WHEELHOUSE_SOURCE: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_source }}
      WHEELHOUSE_ARTIFACT: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_artifact }}
      WHEELHOUSE_ENABLED: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_enabled }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 xvfb

      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb "$DISPLAY" -screen 0 1920x1080x24 > /tmp/xvfb.log 2>&1 &
          echo "DISPLAY=${DISPLAY}" >> "$GITHUB_ENV"
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          # Give Xvfb a moment to become ready.
          sleep 3

      # Wheelhouse consumer: uses artifact produced in prepare-wheelhouse.
      - name: Download PySide6 wheel artifact
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" -- \
            PySide6==${{ env.PYSIDE6_VERSION }} \
            PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
            PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
            shiboken6==${{ env.PYSIDE6_VERSION }}
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" -- .[dev]

      - name: Run QML pytest suite
        run: |
          set -o pipefail
          mkdir -p test-results/qml
          pytest -m qml --maxfail=1 --disable-warnings \
            --junitxml=test-results/qml/pytest.xml --durations=15 \
            --log-file=test-results/qml/pytest.log --log-file-level=INFO | tee test-results/qml/pytest-console.log

      - name: Upload QML diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-test-diagnostics
          path: test-results/qml
          if-no-files-found: warn
          retention-days: 3

      - name: Stop virtual display
        if: always()
        run: |
          if [[ -n "${XVFB_PID:-}" ]]; then
            kill "$XVFB_PID" || true
          fi

  grpc-feed-integration:
    name: gRPC Decision Feed Integration
    runs-on: ubuntu-latest
    needs: prepare-wheelhouse
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
      WHEELHOUSE_DIR: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_dir }}
      WHEELHOUSE_SOURCE: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_source }}
      WHEELHOUSE_ARTIFACT: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_artifact }}
      WHEELHOUSE_ENABLED: ${{ needs.prepare-wheelhouse.outputs.wheelhouse_enabled }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libpulse0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0

      # Wheelhouse consumer: uses artifact produced in prepare-wheelhouse.
      - name: Download PySide6 wheel artifact
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" -- \
            PySide6==${{ env.PYSIDE6_VERSION }} \
            PySide6_Addons==${{ env.PYSIDE6_VERSION }} \
            PySide6_Essentials==${{ env.PYSIDE6_VERSION }} \
            shiboken6==${{ env.PYSIDE6_VERSION }}
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" -- .[dev]

      - name: Generate trading stubs
        run: python scripts/generate_trading_stubs.py --skip-cpp

      - name: Run gRPC decision feed tests
        run: |
          mkdir -p test-results/grpc
          pytest tests/integration/test_grpc_transport.py --maxfail=1 --disable-warnings \
            --junitxml=test-results/grpc/pytest.xml

      - name: Assert gRPC decision feed SLO
        run: |
          python - <<'PY'
          import json
          import pathlib
          import yaml

          metrics_path = pathlib.Path("reports/ci/decision_feed_metrics.json")
          if not metrics_path.exists():
              raise SystemExit("Brak pliku decision_feed_metrics.json")
          payload = json.loads(metrics_path.read_text(encoding="utf-8"))
          config_path = pathlib.Path("config/runtime.yaml")
          feed_sla = {
              "latency_warning_ms": 3000.0,
              "latency_critical_ms": 5000.0,
              "reconnects_warning": 3.0,
              "downtime_warning_seconds": 30.0,
          }
          if config_path.exists():
              config = yaml.safe_load(config_path.read_text(encoding="utf-8")) or {}
              feed_sla.update(((config.get("observability") or {}).get("feed_sla")) or {})

          p95_ms = float(payload.get("p95_ms", 0.0))
          if p95_ms > float(feed_sla["latency_warning_ms"]):
              raise SystemExit(
                  f"Latencja p95 {p95_ms:.2f} ms przekracza próg ostrzegawczy {feed_sla['latency_warning_ms']} ms"
              )
          reconnects = float(payload.get("reconnects", 0.0))
          if reconnects > float(feed_sla["reconnects_warning"]):
              raise SystemExit(
                  f"Liczba reconnectów {reconnects} przekracza próg {feed_sla['reconnects_warning']}"
              )
          downtime_ms = float(payload.get("downtimeMs", payload.get("downtime_ms", 0.0)))
          if downtime_ms < 0.0:
              raise SystemExit(f"downtimeMs ujemne: {downtime_ms}")
          downtime_seconds = float(payload.get("downtime_seconds", downtime_ms / 1000.0))
          if downtime_seconds > float(feed_sla.get("downtime_warning_seconds", 30.0)):
              raise SystemExit(
                  f"Downtime {downtime_seconds}s przekracza próg {feed_sla.get('downtime_warning_seconds', 30.0)}s"
              )
          next_retry = payload.get("nextRetrySeconds", payload.get("next_retry_seconds"))
          if next_retry is not None and float(next_retry) < 0.0:
              raise SystemExit(f"nextRetrySeconds ujemne: {next_retry}")
          print(
              "decision-feed-metrics OK:",
              f"p95_ms={p95_ms} <= {feed_sla['latency_warning_ms']} ms,",
              f"reconnects={reconnects} <= {feed_sla['reconnects_warning']},",
              f"downtime_s={downtime_seconds} <= {feed_sla.get('downtime_warning_seconds', 30.0)}",
          )
          PY

      - name: Generate feed alert summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import pathlib

          metrics_path = pathlib.Path("reports/ci/decision_feed_metrics.json")
          alert_path = pathlib.Path("reports/ci/decision_feed_alerts.json")
          summary: dict[str, object]
          if metrics_path.exists():
              payload = json.loads(metrics_path.read_text(encoding="utf-8"))
              summary = {
                  "latency_state": payload.get("latency_state", "unknown"),
                  "reconnects_state": payload.get("reconnects_state", "unknown"),
                  "downtime_state": payload.get("downtime_state", "unknown"),
                  "p95_ms": payload.get("p95_ms"),
                  "reconnects": payload.get("reconnects"),
                  "downtime_seconds": payload.get("downtime_seconds", payload.get("downtimeMs", 0.0) / 1000.0),
                  "transports": payload.get("transports", {}),
                  "status": payload.get("status", "unknown"),
              }
          else:
              summary = {"status": "missing_metrics"}
          alert_path.parent.mkdir(parents=True, exist_ok=True)
          alert_path.write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grpc-feed-pytest-results
          path: test-results/grpc
          if-no-files-found: warn
          retention-days: 3

      - name: Upload decision feed metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-feed-metrics
          path: reports/ci/decision_feed_metrics.json
          if-no-files-found: warn
          retention-days: 3

      - name: Upload feed alert diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-feed-alerts
          path: |
            reports/ci/decision_feed_alerts.json
            logs/ui_telemetry_alerts.jsonl
          if-no-files-found: warn
          retention-days: 3

