    if: github.event_name != 'schedule'
    name: UI QML Tests
    runs-on: ubuntu-latest
    needs: prepare-wheelhouse
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
      PYTEST_REQUIRE_QML: "1"
