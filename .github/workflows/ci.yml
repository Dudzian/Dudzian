      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb "$DISPLAY" -screen 0 1920x1080x24 > /tmp/xvfb.log 2>&1 &
          echo "DISPLAY=${DISPLAY}" >> "$GITHUB_ENV"
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          sleep 3

      - name: Download PySide6 wheel artifact
        uses: actions/download-artifact@v7
        with:
          name: wheelhouse-Linux-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- \
            PySide6==${PYSIDE6_VERSION} \
            PySide6_Addons==${PYSIDE6_VERSION} \
            PySide6_Essentials==${PYSIDE6_VERSION} \
            shiboken6==${PYSIDE6_VERSION}
          python scripts/ci/pip_install.py --wheelhouse "$WHEELHOUSE_DIR" --require-wheelhouse -- .[test]

      - name: Preflight test environment
        shell: bash
        run: |
          python scripts/ci/preflight_test_env.py

      - name: Collect/import QML risk panel test module (smoke)
        run: |
          set -o pipefail
          output=$(python -m pytest --collect-only -q tests/ui/qml/test_risk_panels.py | tee /dev/stderr)
          if echo "$output" | grep -Fq "found no collectors"; then
            echo "Detected pytest collection error: found no collectors"
            exit 1
          fi

      - name: Run QML pytest suite
        run: |
          set -o pipefail
          mkdir -p test-results/qml
          python -m pytest -m qml --maxfail=1 --disable-warnings \
            --junitxml=test-results/qml/pytest.xml --durations=15 \
            --log-file=test-results/qml/pytest.log --log-file-level=INFO | tee test-results/qml/pytest-console.log

      - name: Upload QML diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: qml-test-diagnostics
          path: test-results/qml
          if-no-files-found: warn
          retention-days: 3

      - name: Stop virtual display
        if: always()
        run: |
          if [[ -n "${XVFB_PID:-}" ]]; then
            kill "$XVFB_PID" || true
          fi

