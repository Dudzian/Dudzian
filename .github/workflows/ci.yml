          name: ui-bundle-linux
          path: artifacts/ui/linux
          retention-days: 3

  deploy:
    name: Release marketplace assets
    runs-on: windows-latest
    needs:
      - marketplace-catalog
      - ui-packaging
    if: |
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/stable' ||
        startsWith(github.ref, 'refs/heads/release/') ||
        startsWith(github.ref, 'refs/tags/v')
      )
    env:
      MARKETPLACE_PACKAGES_ARTIFACT: ${{ needs.marketplace-catalog.outputs.packages_artifact_name || 'marketplace-packages' }}
      MARKETPLACE_PACKAGES_ARCHIVE: ${{ needs.marketplace-catalog.outputs.packages_archive || 'marketplace-packages.tar.gz' }}
      MARKETPLACE_PACKAGES_DIR: artifacts/marketplace
      UI_BUNDLE_ARTIFACT: ui-bundle-linux
      UI_BUNDLE_DIR: artifacts/ui/linux
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[tools]

      - name: Download marketplace packages artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.MARKETPLACE_PACKAGES_ARTIFACT }}
          path: ${{ env.MARKETPLACE_PACKAGES_DIR }}

      - name: Verify marketplace packages artifact
        shell: bash
        run: |
          archive="${MARKETPLACE_PACKAGES_DIR}/${MARKETPLACE_PACKAGES_ARCHIVE}"
          if [[ ! -f "${archive}" ]]; then
            echo "Expected marketplace package archive missing: ${archive}" >&2
            echo "Directory listing for ${MARKETPLACE_PACKAGES_DIR}:"
            ls -la "${MARKETPLACE_PACKAGES_DIR}" || true
            exit 1
          fi
          echo "Marketplace packages archive located: ${archive}"

      - name: Download UI bundle artifact (linux)
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.UI_BUNDLE_ARTIFACT }}
          path: ${{ env.UI_BUNDLE_DIR }}

      - name: Verify UI bundle contents
        shell: bash
        run: |
          if [[ ! -d "${UI_BUNDLE_DIR}" || -z "$(ls -A "${UI_BUNDLE_DIR}" 2>/dev/null)" ]]; then
            echo "UI bundle directory is missing or empty: ${UI_BUNDLE_DIR}" >&2
            ls -la "${UI_BUNDLE_DIR}" || true
            exit 1
          fi
          echo "UI bundle contents:" && ls -la "${UI_BUNDLE_DIR}"

      - name: Build signed marketplace catalog
        shell: bash
        run: |
          python scripts/build_marketplace_catalog.py \
            --private-key config/marketplace/keys/dev-presets-ed25519.key \
            --key-id dev-presets \
            --signing-key dev-hmac:config/marketplace/keys/dev-hmac.key \
            --catalog-signature-key dev-hmac

      - name: Synchronize installer marketplace bundle
        shell: bash
        run: |
          python scripts/build_release_bundle.py \
            --catalog config/marketplace/catalog.json \
            --markdown config/marketplace/catalog.md \
            --packages config/marketplace/packages \
            --installer-root deploy/packaging/samples

      - name: Publish catalog release artefacts
        uses: actions/upload-artifact@v6
        with:
          name: marketplace-catalog-release
          path: |
            config/marketplace/catalog.json
            config/marketplace/catalog.json.sig
            config/marketplace/catalog.md
            config/marketplace/catalog.md.sig
          if-no-files-found: error
          retention-days: 3
