name: Windows Build

"on":
  workflow_dispatch:
  push:
    branches: [work, main]
    tags: ['v*']

jobs:
  build-windows:
    name: Build GymOS Windows x64
    runs-on: windows-latest
    env:
      PYTHONUTF8: '1'
      QT_QPA_PLATFORM: offscreen
      QT_OPENGL: software
      DUDZIAN_QML_FLUSH_DELETES: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            deploy/packaging/requirements-desktop.txt
            deploy/packaging/requirements-desktop.lock

      - name: Install dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/reports | Out-Null
          python -m pip install --upgrade pip
          python -m pip install -r deploy/packaging/requirements-desktop.lock
          python -m pip install -e .[dev,desktop]
          python -m pip install pytest mypy ruff openpyxl
          python -m pip check
          python -m pip freeze | Out-File -FilePath build/reports/pip-freeze.txt -Encoding utf8

      - name: Focused tests
        shell: pwsh
        run: python -m pytest tests/windows_build -q

      - name: Windows build probe
        shell: pwsh
        run: python scripts/windows_build_probe.py

      - name: Build onedir app
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Verify EXE exists
        shell: pwsh
        run: |
          if (-not (Test-Path build/output/GymOS/GymOS.exe)) { throw 'Missing build/output/GymOS/GymOS.exe' }

      - name: Create BUILD_INFO and checksums
        shell: pwsh
        run: |
          $artifactName = "GymOS-windows-${{ github.run_number }}-${{ github.sha }}"
          $version = python -c "import importlib.metadata as m; print(m.version('dudzian-bot'))"
          $pySideVersion = python -c "import importlib.metadata as m; print(m.version('PySide6'))"
          $pyInstallerVersion = python -c "import importlib.metadata as m; print(m.version('pyinstaller'))"
          @(
            "application=GymOS",
            "version=$version",
            "commit=${{ github.sha }}",
            "branch_ref=${{ github.ref }}",
            "run_number=${{ github.run_number }}",
            "run_id=${{ github.run_id }}",
            "python_version=$(python --version)",
            "pyside6_version=$pySideVersion",
            "pyinstaller_version=$pyInstallerVersion",
            "windows_version=$([System.Environment]::OSVersion.VersionString)",
            "architecture=$env:PROCESSOR_ARCHITECTURE",
            "artifact=$artifactName",
            "build_timestamp_utc=$((Get-Date).ToUniversalTime().ToString('o'))"
          ) | Out-File -FilePath build/output/GymOS/BUILD_INFO.txt -Encoding utf8
          Copy-Item build/output/GymOS/BUILD_INFO.txt build/reports/BUILD_INFO.txt -Force
          Get-ChildItem build/output/GymOS -Recurse -File | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -Path $_.FullName
            "$($hash.Hash.ToLower())  $($_.FullName.Substring((Resolve-Path build/output/GymOS).Path.Length + 1).Replace('\\','/'))"
          } | Out-File -FilePath build/output/GymOS/SHA256SUMS.txt -Encoding utf8
          Copy-Item build/output/GymOS/SHA256SUMS.txt build/reports/SHA256SUMS.txt -Force

      - name: Verify artifact contents
        shell: pwsh
        run: python scripts/verify_windows_artifact.py build/output/GymOS *> build/reports/artifact-verify.log

      - name: Smoke test isolated artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/reports | Out-Null
          $isolated = Join-Path $env:RUNNER_TEMP "GymOS-isolated-smoke"
          if (Test-Path $isolated) { Remove-Item -Recurse -Force $isolated }
          New-Item -ItemType Directory -Force -Path $isolated | Out-Null
          Copy-Item -Recurse -Path build/output/GymOS/* -Destination $isolated
          Set-Location $isolated
          if (Test-Path .git) { throw "Checkout metadata leaked into isolated artifact" }
          if (Test-Path .venv) { throw "Development virtualenv leaked into isolated artifact" }
          & .\GymOS.exe --smoke-test --offscreen *> "$env:GITHUB_WORKSPACE\build\reports\smoke-test.log"
          $code = $LASTEXITCODE
          "exit_code=$code" | Out-File -FilePath "$env:GITHUB_WORKSPACE\build\reports\smoke-test-exit-code.txt" -Encoding utf8
          if ($code -ne 0) { exit $code }

      - name: Package ZIP
        shell: pwsh
        run: |
          $zipName = "GymOS-windows-${{ github.run_number }}-${{ github.sha }}.zip"
          $zipPath = "build/output/$zipName"
          Compress-Archive -Path build/output/GymOS/* -DestinationPath $zipPath -Force
          $zipHash = Get-FileHash -Algorithm SHA256 -Path $zipPath
          "$($zipHash.Hash.ToLower())  $zipName" | Out-File -FilePath build/reports/ZIP_SHA256.txt -Encoding utf8

      - name: Upload app ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GymOS-windows-${{ github.run_number }}-${{ github.sha }}
          path: build/output/GymOS-windows-${{ github.run_number }}-${{ github.sha }}.zip
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GymOS-windows-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            build/reports/windows_environment_report.json
            build/reports/build.log
            build/reports/smoke-test.log
            build/reports/smoke-test-exit-code.txt
            build/reports/BUILD_INFO.txt
            build/reports/SHA256SUMS.txt
            build/reports/artifact-verify.log
            build/reports/pip-freeze.txt
            build/reports/ZIP_SHA256.txt
          if-no-files-found: ignore
