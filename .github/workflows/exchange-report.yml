name: exchange-report

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  generate-exchange-report:
    name: Generate exchange signal-quality snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Set long-poll freshness thresholds
        run: |
          python - <<"PY"
          import os
          from bot_core.config.long_poll import (
              LONG_POLL_FUTURE_GRACE_MINUTES,
              LONG_POLL_MAX_AGE_MINUTES,
          )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as env_file:
              env_file.write(f"LONG_POLL_MAX_AGE_MINUTES={LONG_POLL_MAX_AGE_MINUTES}\n")
              env_file.write(
                  f"LONG_POLL_FUTURE_GRACE_MINUTES={LONG_POLL_FUTURE_GRACE_MINUTES}\n"
              )
          PY

      - name: Resolve exchange-report long-poll mode
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            schedule)
              echo "LONG_POLL_MODE=strict" >> "$GITHUB_ENV"
              ;;
            workflow_dispatch)
              echo "LONG_POLL_MODE=fixture" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported event for exchange-report workflow: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

      - name: Validate long-poll snapshots
        shell: bash
        run: |
          validator_extra_args=()
          if [ "${LONG_POLL_MODE}" = "fixture" ]; then
            validator_extra_args+=(--skip-freshness)
          fi

          python scripts/validate_long_poll_snapshots.py \
            --input var/metrics/long_poll_snapshots.json \
            --output var/metrics/long_poll_snapshots.json \
            --max-age-minutes "${LONG_POLL_MAX_AGE_MINUTES}" \
            --future-grace-minutes "${LONG_POLL_FUTURE_GRACE_MINUTES}" \
            "${validator_extra_args[@]}"

      - name: Generate exchange report
        shell: bash
        run: |
          report_extra_args=()
          if [ "${LONG_POLL_MODE}" = "fixture" ]; then
            report_extra_args+=(--allow-stale-long-poll)
          fi

          REPORT_DATE=$(date -I)
          python scripts/list_exchange_adapters.py \
            --report-date "$REPORT_DATE" \
            --long-poll-metrics var/metrics/long_poll_snapshots.json \
            --long-poll-ttl-minutes "${LONG_POLL_MAX_AGE_MINUTES}" \
            --generate-hypercare-assets \
            "${report_extra_args[@]}"

      - name: Upload exchange report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exchange-report
          path: |
            reports/exchanges/*.csv
            reports/exchanges/hypercare/*.json
            reports/exchanges/hypercare/*.csv
            reports/exchanges/signal_quality/*.json
            reports/exchanges/signal_quality/*.csv
          if-no-files-found: error
          retention-days: 7
