name: Licensing Drift

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  licensing-drift-check:
    name: Licensing drift compatibility
    runs-on: ubuntu-latest
    env:
      HWID_DRIFT_REPORT: reports/ci/licensing_drift/compatibility.json
      SECURITY_ALERTS_WEBHOOK: ${{ secrets.SECURITY_ALERTS_WEBHOOK }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Prepare report directory
        run: mkdir -p "$(dirname "${HWID_DRIFT_REPORT}")"

      - name: Run licensing drift tests
        id: pytest
        continue-on-error: true
        run: |
          set -o pipefail
          pytest tests/licensing/test_hwid_drift.py -q | tee reports/ci/licensing_drift/pytest.log

      - name: Generate licensing drift report
        run: python scripts/generate_hwid_drift_report.py --output "${HWID_DRIFT_REPORT}"

      - name: Upload licensing drift artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: licensing-drift-reports
          path: reports/ci/licensing_drift/
          if-no-files-found: error

      - name: Upload licensing drift test log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: licensing-drift-pytest-log
          path: reports/ci/licensing_drift/pytest.log
          if-no-files-found: error

      - name: Publish licensing drift status
        if: ${{ always() && env.SECURITY_ALERTS_WEBHOOK != '' }}
        run: |
          status=$(python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("${HWID_DRIFT_REPORT}")
          data = json.loads(report_path.read_text()) if report_path.exists() else {}
          print(data.get("status", "unknown"))
          PY
          )
          echo "Parsed status: ${status}"
          curl -X POST -H "Content-Type: application/json" -d "{\"status\":\"${status}\"}" "${SECURITY_ALERTS_WEBHOOK}"

      - name: Fail if licensing drift tests failed
        if: ${{ steps.pytest.conclusion == 'failure' }}
        run: exit 1

  licensing-drift-summary:
    name: Licensing drift consolidation
    runs-on: ubuntu-latest
    needs:
      - licensing-drift-check
    if: ${{ always() }}
    env:
      LICENSING_DRIFT_DIR: reports/ci/licensing_drift
      LICENSING_DRIFT_DASHBOARD_DIR: reports/ci/licensing_drift/dashboard
      LICENSING_DRIFT_PUSHGATEWAY: ${{ secrets.LICENSING_DRIFT_PUSHGATEWAY || vars.LICENSING_DRIFT_PUSHGATEWAY || vars.CI_PUSHGATEWAY_DEFAULT }}
      LICENSING_DRIFT_PUSHGATEWAY_AUTH: ${{ secrets.LICENSING_DRIFT_PUSHGATEWAY_AUTH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download licensing drift artifacts
        uses: actions/download-artifact@v4
        with:
          name: licensing-drift-reports
          path: reports/ci/licensing_drift

      - name: Download licensing drift test log
        uses: actions/download-artifact@v4
        with:
          name: licensing-drift-pytest-log
          path: reports/ci/licensing_drift

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Consolidate licensing drift artifacts
        run: |
          python scripts/aggregate_licensing_drift_reports.py \
            --input-dir "${LICENSING_DRIFT_DIR}" \
            --dashboard-dir "${LICENSING_DRIFT_DASHBOARD_DIR}" \
            --run-id "${GITHUB_RUN_ID}"

      - name: Publish licensing drift metrics to Pushgateway
        if: ${{ always() }}
        run: |
          set -euo pipefail

          prom_file="${LICENSING_DRIFT_DASHBOARD_DIR}/licensing_drift.prom"

          if [ ! -f "${prom_file}" ]; then
            echo "licensing_drift.prom is missing; skipping metrics push."
            exit 0
          fi

          if [ -z "${LICENSING_DRIFT_PUSHGATEWAY:-}" ]; then
            {
              echo "### Licensing drift metrics"
              echo ":warning: Pushgateway is not configured (LICENSING_DRIFT_PUSHGATEWAY)."
              echo "- Artefakty .prom/.parquet są dostępne, ale Grafana nie otrzyma danych z tego przebiegu."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          basic_auth_args=()
          if [ -n "${LICENSING_DRIFT_PUSHGATEWAY_AUTH:-}" ]; then
            basic_auth_args+=(--basic-auth-env LICENSING_DRIFT_PUSHGATEWAY_AUTH)
          fi

          python scripts/publish_licensing_drift_metrics.py \
            --prom-file "${prom_file}" \
            --pushgateway "${LICENSING_DRIFT_PUSHGATEWAY}" \
            --grouping-label run_id="${GITHUB_RUN_ID}" \
            --timeout 15 "${basic_auth_args[@]}"

          {
            echo "### Licensing drift metrics"
            echo ":white_check_mark: Metryki licensing drift zostały wypchnięte do Pushgateway."
            echo "- Źródło: ${prom_file}"
            echo "- Target: ${LICENSING_DRIFT_PUSHGATEWAY%/}/metrics/job/licensing-drift/run_id/${GITHUB_RUN_ID}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload consolidated licensing drift summary
        uses: actions/upload-artifact@v4
        with:
          name: licensing-drift-summary
          path: |
            reports/ci/licensing_drift/licensing_drift_summary.json
            reports/ci/licensing_drift/licensing_drift_summary.csv
            reports/ci/licensing_drift/licensing_drift_summary.parquet
            reports/ci/licensing_drift/dashboard/
          if-no-files-found: error
