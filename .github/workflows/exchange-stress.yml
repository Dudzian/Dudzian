name: exchange-stress

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: write
  contents: read

jobs:
  exchange-stress:
    name: Exchange stress load test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      metrics_json: ${{ steps.publish-metrics.outputs.metrics_json }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Prepare log directory
        run: mkdir -p logs/loadtests

      - name: Run exchange stress test
        run: |
          python scripts/loadtests/exchange_stress.py \
            --config config/loadtests/exchange_stress.yml \
            --seed 1337 \
            --output logs/loadtests/exchange_stress.json

      - name: Validate exchange stress SLA
        run: pytest tests/load/test_exchange_stress.py

      - name: Publish exchange stress metrics
        if: always()
        id: publish-metrics
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from typing import Any, Mapping

          report_path = Path("logs/loadtests/exchange_stress.json")
          if not report_path.is_file():
              raise SystemExit(f"Report not found: {report_path}")

          try:
              payload = json.loads(report_path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Unable to parse JSON report: {exc}")

          if not isinstance(payload, Mapping):
              raise SystemExit("Report root must be a mapping")

          exchanges = payload.get("exchanges")
          if not isinstance(exchanges, Mapping) or not exchanges:
              raise SystemExit("Report must contain non-empty 'exchanges' mapping")


          def _get_number(value: Any, default: float) -> float:
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return default

          rows = []
          for name, metrics in sorted(exchanges.items()):
              if not isinstance(metrics, Mapping):
                  raise SystemExit(f"Metrics for '{name}' must be a mapping")

              latency = metrics.get("latency_ms", {})
              if not isinstance(latency, Mapping):
                  raise SystemExit(f"Latency metrics for '{name}' must be a mapping")

              avg_ms = _get_number(latency.get("avg_ms", 0.0), 0.0)
              p95_ms = _get_number(latency.get("p95_ms", 0.0), 0.0)
              errors = int(_get_number(metrics.get("errors", 0), 0))
              total = int(_get_number(metrics.get("total_requests", 0), 0))
              throttled = int(_get_number(metrics.get("throttled", 0), 0))
              retry_attempts = int(_get_number(metrics.get("retry_attempts", 0), 0))
              transient_5xx = int(_get_number(metrics.get("transient_5xx", 0), 0))
              throttle_events = int(_get_number(metrics.get("throttle_events", 0), 0))
              transient_transport_errors = int(
                  _get_number(metrics.get("transient_transport_errors", 0), 0)
              )
              recovered_after_retry = int(_get_number(metrics.get("recovered_after_retry", 0), 0))
              denominator = total if total > 0 else 1
              throttle_rate = throttled / denominator
              rows.append(
                  (
                      name,
                      avg_ms,
                      p95_ms,
                      errors,
                      throttle_rate,
                      retry_attempts,
                      transient_5xx,
                      throttle_events,
                      transient_transport_errors,
                      recovered_after_retry,
                  )
              )

          lines = [
              "# Exchange stress metrics",
              "",
              "| Exchange | avg_ms | p95_ms | errors | throttle_rate | retry_attempts | transient_5xx | throttle_events | transient_transport_errors | recovered_after_retry |",
              "| --- | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: |",
          ]
          for (
              name,
              avg_ms,
              p95_ms,
              errors,
              throttle_rate,
              retry_attempts,
              transient_5xx,
              throttle_events,
              transient_transport_errors,
              recovered_after_retry,
          ) in rows:
              lines.append(
                  f"| {name} | {avg_ms:.3f} | {p95_ms:.3f} | {errors} | {throttle_rate:.2%} | {retry_attempts} | {transient_5xx} | {throttle_events} | {transient_transport_errors} | {recovered_after_retry} |"
              )

          content = "\n".join(lines) + "\n"
          summary_path = Path("exchange_stress_summary.md")
          summary_path.write_text(content, encoding="utf-8")

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_file:
              with Path(summary_file).open("a", encoding="utf-8") as handle:
                  handle.write(content)

          outputs = {
              name: {
                  "avg_ms": avg_ms,
                  "p95_ms": p95_ms,
                  "errors": errors,
                  "throttle_rate": throttle_rate,
                  "retry_attempts": retry_attempts,
                  "transient_5xx": transient_5xx,
                  "throttle_events": throttle_events,
                  "transient_transport_errors": transient_transport_errors,
                  "recovered_after_retry": recovered_after_retry,
              }
              for (
                  name,
                  avg_ms,
                  p95_ms,
                  errors,
                  throttle_rate,
                  retry_attempts,
                  transient_5xx,
                  throttle_events,
                  transient_transport_errors,
                  recovered_after_retry,
              ) in rows
          }

          output_file = os.environ.get("GITHUB_OUTPUT")
          if output_file:
              payload = json.dumps(outputs, sort_keys=True)
              with Path(output_file).open("a", encoding="utf-8") as handle:
                  handle.write("metrics_json<<EOF\n")
                  handle.write(f"{payload}\n")
                  handle.write("EOF\n")

          print(content)
          PY

      - name: Upload exchange stress artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exchange-stress-report
          path: logs/loadtests/exchange_stress.json
          if-no-files-found: error
          retention-days: 14
