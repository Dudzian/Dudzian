name: DR Checks

# Disaster Recovery workflow mapping to runbooks:
# - dr-probes: Runbook step "Cloud DR synthetic probes" (pre-failover readiness)
# - dr-failover-validation: Runbook step "Alerting DR failover validation" (targeted failover path)
# - dr-weekly-failover-snapshots: Runbook step "Weekly DR failover snapshots" (evidence collection)
# - dr-weekly-failover-runbook: Runbook step "DR weekly failover" (full procedural exercise)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"
    - cron: "0 3 * * 1"
    - cron: "15 4 * * 0"

jobs:
  dr-probes:
    name: Cloud DR synthetic probes
    runs-on: ubuntu-latest

    steps:
      - name: Show workflow run revision details
        shell: bash
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "::group::Workflow run revision details"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "head_ref=${GITHUB_HEAD_REF:-<none>}"
          echo "base_ref=${GITHUB_BASE_REF:-<none>}"
          echo "sha=${GITHUB_SHA}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          echo "run_number=${GITHUB_RUN_NUMBER}"
          echo "run_url=${run_url}"
          echo "::endgroup::"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Workflow run revision details"
              echo "- job: \`${GITHUB_JOB}\`"
              echo "- sha: \`${GITHUB_SHA}\`"
              echo "- run_number: \`${GITHUB_RUN_NUMBER}\`"
              echo "- run_attempt: \`${GITHUB_RUN_ATTEMPT}\`"
              echo "- run_url: [${run_url}](${run_url})"
              echo
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate DR probe secrets
        id: validate_probe_secrets
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
        run: |
          ./scripts/validate_dr_secrets.sh \
            "Missing DR probe secrets" \
            "Cloud DR probe summary" \
            DR_GRPC_ENDPOINT \
            DR_PROMETHEUS_URL

      - name: Set up Python for DR probes
        id: setup_python_probes
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DR probe dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          # optional: ensure common problematic packages are up-to-date
          python -m pip install --upgrade setuptools_scm
          # install the local package
          pip install .[dev]

      - name: Run Cloud DR synthetic probes (pre-failover readiness)
        env:
          PYTHONVERBOSE: "1"
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_ALERTMANAGER_URL: ${{ secrets.DR_ALERTMANAGER_URL }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
        run: |
          python scripts/dr_synthetic_probes.py \
            --endpoint "${DR_GRPC_ENDPOINT:-localhost:50051}" \
            ${DR_ALERTMANAGER_URL:+--alertmanager-url "$DR_ALERTMANAGER_URL"} \
            ${DR_PROMETHEUS_URL:+--prometheus-url "$DR_PROMETHEUS_URL"} \
            --output-dir reports/ci/dr_probes

      - name: Summarize Cloud DR probe results
        if: ${{ always() && steps.validate_probe_secrets.outcome == 'success' && steps.setup_python_probes.outcome == 'success' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_dir = Path("reports/ci/dr_probes")
          output_dir.mkdir(parents=True, exist_ok=True)
          reports = sorted(output_dir.glob("cloud_orchestrator_probe_*.json"))

          if not reports:
              summary_lines = [
                  "## Cloud DR probe summary",
                  "- status: **fail**",
                  "- reason: report missing (probe run likely failed before writing output)",
              ]
              status_payload = {"status": "fail", "reason": "report_missing"}
          else:
              latest = reports[-1]
              data = json.loads(latest.read_text(encoding="utf-8"))
              summary = data.get("summary", {})
              health_ok = bool(summary.get("healthOk"))
              alert_ok = bool(summary.get("alertmanagerOk"))
              prom_ok = bool(summary.get("prometheusOk"))
              overall_ok = health_ok and alert_ok and prom_ok
              status_payload = {
                  "status": "pass" if overall_ok else "fail",
                  "healthOk": health_ok,
                  "alertmanagerOk": alert_ok,
                  "prometheusOk": prom_ok,
                  "report": latest.name,
              }
              summary_lines = [
                  "## Cloud DR probe summary",
                  f"- status: **{'pass' if overall_ok else 'fail'}**",
                  f"- health RPC ok: `{health_ok}`",
                  f"- alertmanager ok: `{alert_ok}`",
                  f"- prometheus ok: `{prom_ok}`",
                  f"- latest report: `{latest}`",
                  "- impact: probes must be green before DR failover exercises",
              ]

          (output_dir / "probe_status.json").write_text(
              json.dumps(status_payload, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          (output_dir / "summary.md").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")

          summary_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_env:
              summary_path = Path(summary_env)
              with summary_path.open("a", encoding="utf-8") as summary_file:
                  summary_file.write("\n".join(summary_lines) + "\n")
          print("\n".join(summary_lines))
          PY

      - name: Publish DR probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-probes-report
          path: reports/ci/dr_probes/
          if-no-files-found: warn
          retention-days: 7

  dr-failover-validation:
    name: Alerting DR failover validation
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * 1'
    runs-on: ubuntu-latest

    steps:
      - name: Show workflow run revision details
        shell: bash
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "::group::Workflow run revision details"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "head_ref=${GITHUB_HEAD_REF:-<none>}"
          echo "base_ref=${GITHUB_BASE_REF:-<none>}"
          echo "sha=${GITHUB_SHA}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          echo "run_number=${GITHUB_RUN_NUMBER}"
          echo "run_url=${run_url}"
          echo "::endgroup::"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Workflow run revision details"
              echo "- job: \`${GITHUB_JOB}\`"
              echo "- sha: \`${GITHUB_SHA}\`"
              echo "- run_number: \`${GITHUB_RUN_NUMBER}\`"
              echo "- run_attempt: \`${GITHUB_RUN_ATTEMPT}\`"
              echo "- run_url: [${run_url}](${run_url})"
              echo
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate DR failover secrets
        id: validate_failover_secrets
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
          DR_STANDBY_PROMETHEUS_URL: ${{ secrets.DR_STANDBY_PROMETHEUS_URL }}
        run: |
          ./scripts/validate_dr_secrets.sh \
            "Missing DR failover secrets" \
            "Failover validation summary" \
            DR_GRPC_ENDPOINT \
            DR_PROMETHEUS_URL \
            DR_STANDBY_PROMETHEUS_URL

      - name: Set up Python for failover validation
        id: setup_python_failover
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DR validation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          # optional: ensure common problematic packages are up-to-date
          python -m pip install --upgrade setuptools_scm
          # install the local package
          pip install .[dev]

      - name: Run DR failover validation (alerting path)
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_ALERTMANAGER_URL: ${{ secrets.DR_ALERTMANAGER_URL }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
          DR_STANDBY_ALERTMANAGER_URL: ${{ secrets.DR_STANDBY_ALERTMANAGER_URL }}
          DR_STANDBY_PROMETHEUS_URL: ${{ secrets.DR_STANDBY_PROMETHEUS_URL }}
          DR_FAILOVER_WEBHOOK: ${{ secrets.DR_FAILOVER_WEBHOOK }}
        run: |
          python scripts/dr_failover_validation.py \
            --endpoint "${DR_GRPC_ENDPOINT:-localhost:50051}" \
            ${DR_ALERTMANAGER_URL:+--alertmanager-url "$DR_ALERTMANAGER_URL"} \
            ${DR_PROMETHEUS_URL:+--prometheus-url "$DR_PROMETHEUS_URL"} \
            ${DR_STANDBY_ALERTMANAGER_URL:+--dr-alertmanager-url "$DR_STANDBY_ALERTMANAGER_URL"} \
            ${DR_STANDBY_PROMETHEUS_URL:+--dr-prometheus-url "$DR_STANDBY_PROMETHEUS_URL"} \
            ${DR_FAILOVER_WEBHOOK:+--failover-webhook "$DR_FAILOVER_WEBHOOK"} \
            --output-dir reports/ci/dr_failover

      - name: Summarize failover validation results
        if: ${{ always() && steps.validate_failover_secrets.outcome == 'success' && steps.setup_python_failover.outcome == 'success' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("reports/ci/dr_failover/dr_failover_report.json")
          report_path.parent.mkdir(parents=True, exist_ok=True)

          if not report_path.exists():
              summary_lines = [
                  "## Failover validation summary",
                  "- status: **fail**",
                  "- reason: report missing (validation did not complete)",
              ]
              status_payload = {"status": "fail", "reason": "report_missing"}
          else:
              data = json.loads(report_path.read_text(encoding="utf-8"))
              summary = data.get("summary", {})
              failure_reasons = summary.get("failureReasons") or []
              status = summary.get("status", "unknown")
              status_payload = {
                  "status": status,
                  "beforeOk": summary.get("beforeOk"),
                  "afterOk": summary.get("afterOk"),
                  "probeRegression": summary.get("probeRegression"),
                  "failureReasons": failure_reasons,
              }
              summary_lines = [
                  "## Failover validation summary",
                  f"- status: **{status}**",
                  f"- probes before failover ok: `{summary.get('beforeOk')}`",
                  f"- probes after failover ok: `{summary.get('afterOk')}`",
                  f"- probe regression detected: `{summary.get('probeRegression')}`",
                  f"- failure reasons: `{', '.join(failure_reasons) if failure_reasons else 'none'}`",
                  "- impact: alerts and probes must stay healthy after failover",
              ]

          status_path = report_path.parent / "failover_status.json"
          status_path.write_text(json.dumps(status_payload, ensure_ascii=False, indent=2), encoding="utf-8")
          (report_path.parent / "summary.md").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")

          summary_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_env:
              summary_path = Path(summary_env)
              with summary_path.open("a", encoding="utf-8") as summary_file:
                  summary_file.write("\n".join(summary_lines) + "\n")
          print("\n".join(summary_lines))
          PY

      - name: Publish DR failover report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-failover-report
          path: reports/ci/dr_failover/
          if-no-files-found: warn
          retention-days: 14

  dr-weekly-failover-snapshots:
    name: Weekly DR failover snapshots
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 4 * * 0'
    runs-on: ubuntu-latest

    steps:
      - name: Show workflow run revision details
        shell: bash
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "::group::Workflow run revision details"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "head_ref=${GITHUB_HEAD_REF:-<none>}"
          echo "base_ref=${GITHUB_BASE_REF:-<none>}"
          echo "sha=${GITHUB_SHA}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          echo "run_number=${GITHUB_RUN_NUMBER}"
          echo "run_url=${run_url}"
          echo "::endgroup::"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Workflow run revision details"
              echo "- job: \`${GITHUB_JOB}\`"
              echo "- sha: \`${GITHUB_SHA}\`"
              echo "- run_number: \`${GITHUB_RUN_NUMBER}\`"
              echo "- run_attempt: \`${GITHUB_RUN_ATTEMPT}\`"
              echo "- run_url: [${run_url}](${run_url})"
              echo
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate weekly DR snapshot secrets
        id: validate_weekly_snapshot_secrets
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
          DR_STANDBY_PROMETHEUS_URL: ${{ secrets.DR_STANDBY_PROMETHEUS_URL }}
        run: |
          ./scripts/validate_dr_secrets.sh \
            "Missing weekly DR snapshot secrets" \
            "Weekly failover snapshot summary" \
            DR_GRPC_ENDPOINT \
            DR_PROMETHEUS_URL \
            DR_STANDBY_PROMETHEUS_URL

      - name: Set up Python for weekly snapshots
        id: setup_python_weekly_snapshots
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DR snapshot dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          # optional: ensure common problematic packages are up-to-date
          python -m pip install --upgrade setuptools_scm
          # install the local package
          pip install .[dev]

      - name: Run DR failover with snapshots (evidence collection)
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_ALERTMANAGER_URL: ${{ secrets.DR_ALERTMANAGER_URL }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
          DR_STANDBY_ALERTMANAGER_URL: ${{ secrets.DR_STANDBY_ALERTMANAGER_URL }}
          DR_STANDBY_PROMETHEUS_URL: ${{ secrets.DR_STANDBY_PROMETHEUS_URL }}
          DR_FAILOVER_WEBHOOK: ${{ secrets.DR_FAILOVER_WEBHOOK }}
        run: |
          python scripts/dr_failover_validation.py \
            --endpoint "${DR_GRPC_ENDPOINT:-localhost:50051}" \
            ${DR_ALERTMANAGER_URL:+--alertmanager-url "$DR_ALERTMANAGER_URL"} \
            ${DR_PROMETHEUS_URL:+--prometheus-url "$DR_PROMETHEUS_URL"} \
            ${DR_STANDBY_ALERTMANAGER_URL:+--dr-alertmanager-url "$DR_STANDBY_ALERTMANAGER_URL"} \
            ${DR_STANDBY_PROMETHEUS_URL:+--dr-prometheus-url "$DR_STANDBY_PROMETHEUS_URL"} \
            ${DR_FAILOVER_WEBHOOK:+--failover-webhook "$DR_FAILOVER_WEBHOOK"} \
            --output-dir reports/ci/dr_failover/weekly \
            --snapshot-prefix reports/ci/dr_failover/weekly/failover_snapshot

      - name: Summarize weekly snapshot validation
        if: ${{ always() && steps.validate_weekly_snapshot_secrets.outcome == 'success' && steps.setup_python_weekly_snapshots.outcome == 'success' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("reports/ci/dr_failover/weekly/dr_failover_report.json")
          report_path.parent.mkdir(parents=True, exist_ok=True)

          if not report_path.exists():
              summary_lines = [
                  "## Weekly failover snapshot summary",
                  "- status: **fail**",
                  "- reason: report missing (snapshot run did not complete)",
              ]
              status_payload = {"status": "fail", "reason": "report_missing"}
          else:
              data = json.loads(report_path.read_text(encoding="utf-8"))
              summary = data.get("summary", {})
              failure_reasons = summary.get("failureReasons") or []
              status = summary.get("status", "unknown")
              status_payload = {
                  "status": status,
                  "beforeOk": summary.get("beforeOk"),
                  "afterOk": summary.get("afterOk"),
                  "probeRegression": summary.get("probeRegression"),
                  "failureReasons": failure_reasons,
                  "snapshotPaths": data.get("snapshots", {}),
              }
              summary_lines = [
                  "## Weekly failover snapshot summary",
                  f"- status: **{status}**",
                  f"- probes before failover ok: `{summary.get('beforeOk')}`",
                  f"- probes after failover ok: `{summary.get('afterOk')}`",
                  f"- snapshot before: `{status_payload['snapshotPaths'].get('before', 'n/a')}`",
                  f"- snapshot after: `{status_payload['snapshotPaths'].get('after', 'n/a')}`",
                  f"- failure reasons: `{', '.join(failure_reasons) if failure_reasons else 'none'}`",
                  "- impact: weekly snapshots feed DR evidence and trend analysis",
              ]

          status_path = report_path.parent / "failover_status.json"
          status_path.write_text(json.dumps(status_payload, ensure_ascii=False, indent=2), encoding="utf-8")
          (report_path.parent / "summary.md").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")

          summary_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_env:
              summary_path = Path(summary_env)
              with summary_path.open("a", encoding="utf-8") as summary_file:
