          print("\n".join(summary_lines))
          PY

      - name: Publish DR weekly snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-failover-weekly
          path: reports/ci/dr_failover/weekly/
          if-no-files-found: warn
          retention-days: 21

  dr-weekly-failover-runbook:
    name: DR weekly failover (runbook)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 4 * * 0'
    runs-on: ubuntu-latest

    steps:
      - name: Show workflow run revision details
        shell: bash
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "::group::Workflow run revision details"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "head_ref=${GITHUB_HEAD_REF:-<none>}"
          echo "base_ref=${GITHUB_BASE_REF:-<none>}"
          echo "sha=${GITHUB_SHA}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          echo "run_number=${GITHUB_RUN_NUMBER}"
          echo "run_url=${run_url}"
          echo "::endgroup::"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Workflow run revision details"
              echo "- job: \`${GITHUB_JOB}\`"
              echo "- sha: \`${GITHUB_SHA}\`"
              echo "- run_number: \`${GITHUB_RUN_NUMBER}\`"
              echo "- run_attempt: \`${GITHUB_RUN_ATTEMPT}\`"
              echo "- run_url: [${run_url}](${run_url})"
              echo
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate weekly DR runbook secrets
        id: validate_weekly_runbook_secrets
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
          DR_STANDBY_PROMETHEUS_URL: ${{ secrets.DR_STANDBY_PROMETHEUS_URL }}
          DR_FAILOVER_WEBHOOK: ${{ secrets.DR_FAILOVER_WEBHOOK }}
        run: |
          ./scripts/validate_dr_secrets.sh \
            "Missing weekly DR runbook secrets" \
            "DR weekly failover runbook summary" \
            DR_GRPC_ENDPOINT \
            DR_PROMETHEUS_URL \
            DR_STANDBY_PROMETHEUS_URL \
            DR_FAILOVER_WEBHOOK

      - name: Set up Python for DR runbook
        id: setup_python_runbook
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DR runbook dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          # optional: ensure common problematic packages are up-to-date
          python -m pip install --upgrade setuptools_scm
          # install the local package
          pip install .[dev]

      - name: Execute DR failover runbook (full exercise)
        env:
          DR_GRPC_ENDPOINT: ${{ secrets.DR_GRPC_ENDPOINT }}
          DR_ALERTMANAGER_URL: ${{ secrets.DR_ALERTMANAGER_URL }}
          DR_PROMETHEUS_URL: ${{ secrets.DR_PROMETHEUS_URL }}
          DR_STANDBY_ALERTMANAGER_URL: ${{ secrets.DR_STANDBY_ALERTMANAGER_URL }}
          DR_STANDBY_PROMETHEUS_URL: ${{ secrets.DR_STANDBY_PROMETHEUS_URL }}
          DR_FAILOVER_WEBHOOK: ${{ secrets.DR_FAILOVER_WEBHOOK }}
        run: |
          python scripts/dr_failover_validation.py \
            --endpoint "${DR_GRPC_ENDPOINT:-localhost:50051}" \
            ${DR_ALERTMANAGER_URL:+--alertmanager-url "$DR_ALERTMANAGER_URL"} \
            ${DR_PROMETHEUS_URL:+--prometheus-url "$DR_PROMETHEUS_URL"} \
            ${DR_STANDBY_ALERTMANAGER_URL:+--dr-alertmanager-url "$DR_STANDBY_ALERTMANAGER_URL"} \
            ${DR_STANDBY_PROMETHEUS_URL:+--dr-prometheus-url "$DR_STANDBY_PROMETHEUS_URL"} \
            ${DR_FAILOVER_WEBHOOK:+--failover-webhook "$DR_FAILOVER_WEBHOOK"} \
            --output-dir reports/ci/dr_failover/runbook \
            --snapshot-prefix reports/ci/dr_failover/runbook/failover_snapshot

      - name: Report synthetic probe regression (post-failover)
        if: ${{ always() && steps.validate_weekly_runbook_secrets.outcome == 'success' && steps.setup_python_runbook.outcome == 'success' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("reports/ci/dr_failover/runbook/dr_failover_report.json")
          if not report_path.exists():
              placeholder = {
                  "probeRegression": None,
                  "beforeOk": None,
                  "afterOk": None,
                  "failureReasons": ["report_missing"],
              }
              out = report_path.with_name("probe_regression.json")
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_text(json.dumps(placeholder, ensure_ascii=False, indent=2), encoding="utf-8")
              print("Regression report missing; wrote placeholder for diagnostics.")
          else:
              data = json.loads(report_path.read_text(encoding="utf-8"))
              summary = data.get("summary", {})
              regression_payload = {
                "probeRegression": bool(summary.get("probeRegression")),
                "beforeOk": summary.get("beforeOk"),
                "afterOk": summary.get("afterOk"),
                "failureReasons": summary.get("failureReasons"),
              }
              out = report_path.with_name("probe_regression.json")
              out.write_text(json.dumps(regression_payload, ensure_ascii=False, indent=2), encoding="utf-8")
              print(f"Synthetic probe regression report written to {out}")
              if regression_payload["probeRegression"]:
                print("Synthetic probes regressed after failover.")
          PY

      - name: Summarize failover comparison for runbook
        if: ${{ always() && steps.validate_weekly_runbook_secrets.outcome == 'success' && steps.setup_python_runbook.outcome == 'success' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("reports/ci/dr_failover/runbook/dr_failover_report.json")
          report_path.parent.mkdir(parents=True, exist_ok=True)

          if not report_path.exists():
              lines = [
                  "## DR failover comparison (runbook)",
                  "- status: **fail**",
                  "- reason: report missing (runbook execution likely failed)",
              ]
              status_payload = {"status": "fail", "reason": "report_missing"}
          else:
              data = json.loads(report_path.read_text(encoding="utf-8"))
              summary = data.get("summary", {})
              comparison = summary.get("comparison", {})
              states = summary.get("states", {})
              before_state = states.get("before", {})
              after_state = states.get("after", {})

              failure_reasons = summary.get("failureReasons") or []
              status_payload = {
                  "status": summary.get("status", "unknown"),
                  "rehydrated": comparison.get("rehydrated"),
                  "rulesInSync": comparison.get("rulesInSync"),
                  "alertsMissing": comparison.get("alertsMissing"),
                  "probeRegression": summary.get("probeRegression"),
                  "failureReasons": failure_reasons,
                  "beforeLastError": before_state.get("lastError"),
                  "afterLastError": after_state.get("lastError"),
              }

              lines = [
                  "## DR failover comparison (runbook)",
                  f"- status: **{status_payload['status']}**",
                  f"- before `_lastError`: `{status_payload['beforeLastError']}`",
                  f"- after `_lastError`: `{status_payload['afterLastError']}`",
                  f"- rehydrated: `{status_payload['rehydrated']}`",
                  f"- rules in sync: `{status_payload['rulesInSync']}`",
                  f"- alerts missing after rehydration: `{status_payload['alertsMissing']}`",
                  f"- probe regression: `{status_payload['probeRegression']}`",
                  f"- failure reasons: `{', '.join(failure_reasons) if failure_reasons else 'none'}`",
                  "- impact: validates full failover runbook end-to-end",
              ]

          status_path = report_path.parent / "failover_status.json"
          status_path.write_text(json.dumps(status_payload, ensure_ascii=False, indent=2), encoding="utf-8")
          (report_path.parent / "summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")

          summary_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_env:
              summary_path = Path(summary_env)
              with summary_path.open("a", encoding="utf-8") as summary_file:
                  summary_file.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          PY

      - name: Publish DR failover runbook artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-failover-runbook
          path: reports/ci/dr_failover/runbook/
          if-no-files-found: warn
          retention-days: 21
