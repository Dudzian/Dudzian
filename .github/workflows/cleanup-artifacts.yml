name: Cleanup old artifacts

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  delete-old-artifacts:
    runs-on: ubuntu-24.04
    steps:
      # Retention policy for high-volume repositories:
      # - Never delete artifacts newer than 24h (safety buffer for active investigations).
      # - Keep the 50 most recently updated artifacts globally.
      # - Keep up to 3 most recent artifacts per artifact name (regardless of age).
      # - Keep everything updated in the last 7 days.
      # - Delete only artifacts older than 7 days that are not protected by global/name keepers.
      - name: Enforce artifact retention policy
        uses: actions/github-script@v8
        with:
          script: |
            const config = {
              retentionDays: 7,
              keepRecentGlobal: 50,
              keepPerName: 3,
              minAgeHoursToDelete: 24,
              sampleSize: 10,
            };

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const nowMs = Date.now();
            const msInHour = 60 * 60 * 1000;
            const msInDay = 24 * msInHour;
            const retentionCutoffMs = nowMs - config.retentionDays * msInDay;
            const freshCutoffMs = nowMs - config.minAgeHoursToDelete * msInHour;

            const allArtifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 },
              (response) => response.data.artifacts || []
            );

            if (allArtifacts.length === 0) {
              core.info('No artifacts found. Nothing to clean.');
              return;
            }

            const artifacts = allArtifacts
              .filter((artifact) => artifact && artifact.id)
              .sort((a, b) => {
                const aMs = new Date(a.updated_at || 0).getTime();
                const bMs = new Date(b.updated_at || 0).getTime();
                return bMs - aMs;
              });

            const globalKeepIds = new Set(
              artifacts.slice(0, config.keepRecentGlobal).map((artifact) => artifact.id)
            );

            const perNameKeepIds = new Set();
            const perNameSeen = new Map();
            for (const artifact of artifacts) {
              const key = artifact.name || '__missing_name__';
              const count = perNameSeen.get(key) || 0;
              if (count < config.keepPerName) {
                perNameKeepIds.add(artifact.id);
                perNameSeen.set(key, count + 1);
              }
            }

            const kept = [];
            const deleteCandidates = [];

            for (const artifact of artifacts) {
              const updatedMs = new Date(artifact.updated_at).getTime();
              if (Number.isNaN(updatedMs)) {
                kept.push({
                  id: artifact.id,
                  name: artifact.name,
                  reason: 'invalid updated_at; kept defensively',
                });
                continue;
              }

              const ageDays = Math.floor((nowMs - updatedMs) / msInDay);

              if (updatedMs >= freshCutoffMs) {
                kept.push({ id: artifact.id, name: artifact.name, reason: 'fresh (<24h)', ageDays });
                continue;
              }

              if (globalKeepIds.has(artifact.id)) {
                kept.push({
                  id: artifact.id,
                  name: artifact.name,
                  reason: `within ${config.keepRecentGlobal} most recent globally`,
                  ageDays,
                });
                continue;
              }

              if (perNameKeepIds.has(artifact.id)) {
                kept.push({
                  id: artifact.id,
                  name: artifact.name,
                  reason: `within ${config.keepPerName} most recent for name`,
                  ageDays,
                });
                continue;
              }

              if (updatedMs >= retentionCutoffMs) {
                kept.push({
                  id: artifact.id,
                  name: artifact.name,
                  reason: `younger than ${config.retentionDays} days`,
                  ageDays,
                });
                continue;
              }

              deleteCandidates.push({ id: artifact.id, name: artifact.name, ageDays });
            }

            const deleted = [];
            const failedDeletes = [];

            for (const candidate of deleteCandidates) {
              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: candidate.id,
                });
                deleted.push(candidate);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                failedDeletes.push({ ...candidate, error: message });
              }
            }

            const summarizeByReason = (items) => {
              const counts = new Map();
              for (const item of items) {
                counts.set(item.reason, (counts.get(item.reason) || 0) + 1);
              }
              return Array.from(counts.entries())
                .sort((a, b) => b[1] - a[1])
                .map(([reason, count]) => `${reason}: ${count}`)
                .join(', ');
            };

            const sample = (items, mapper) =>
              items.slice(0, config.sampleSize).map(mapper).join('; ') || 'none';

            core.info(`Artifacts fetched: ${allArtifacts.length}`);
            core.info(`Artifacts considered: ${artifacts.length}`);
            core.info(`Kept (planned): ${kept.length}`);
            core.info(`Delete candidates: ${deleteCandidates.length}`);
            core.info(`Deleted successfully: ${deleted.length}`);
            core.info(`Delete failures: ${failedDeletes.length}`);

            core.info(`Keep reasons summary: ${summarizeByReason(kept) || 'none'}`);
            core.info(`Sample kept: ${sample(kept, (k) => `${k.name}#${k.id} (${k.reason})`)}`);
            core.info(`Sample delete candidates: ${sample(deleteCandidates, (d) => `${d.name}#${d.id} (${d.ageDays}d)`)}`);
            core.info(`Sample deleted: ${sample(deleted, (d) => `${d.name}#${d.id} (${d.ageDays}d)`)}`);

            if (failedDeletes.length > 0) {
              core.warning(
                `Sample delete failures: ${sample(failedDeletes, (f) => `${f.name}#${f.id} (${f.error})`)}`
              );
            }
