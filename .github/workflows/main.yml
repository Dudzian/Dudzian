name: CI (cross-platform)

run-name: "CI (${{ github.event_name }}: ${{ github.ref_name }})"

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint (pre-commit)"
        type: boolean
        default: false
      run_fast:
        description: "Run fast deterministic tests"
        type: boolean
        default: true
      run_curated:
        description: "Run curated unit test list"
        type: boolean
        default: false
      run_integration:
        description: "Run integration tests"
        type: boolean
        default: false
      run_ui:
        description: "Run UI / QML tests"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  PYTHONHASHSEED: "0"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

  # Wheelhouse strategy (per workflow run, overrideable per-job jeśli trzeba)
  WHEELHOUSE_SOURCE: "build"    # build|skip (artifact mode dołóż jeśli potrzebujesz)
  WHEELHOUSE_DIR: "wheelhouse"

  # Secrets presence flags (safe: only checks existence)
  HAS_MARKETPLACE_KEYS: ${{ secrets.MARKETPLACE_HMAC_KEY != '' }}
  HAS_LICENSING_KEYS: ${{ secrets.LICENSING_PRIVATE_KEY != '' }}

jobs:
  # 1) Budowa wheelhouse per OS (Linux/Windows/macOS) – jeden artefakt na platformę.
  prepare-wheelhouse:
    name: Prepare wheelhouse (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheelhouse
        if: env.WHEELHOUSE_SOURCE == 'build'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          mkdir -p "${WHEELHOUSE_DIR}"

          # Minimalnie: buduj wheelhouse z wszystkiego co potrzebne do testów.
          # Jeśli masz swoje narzędzie (np. scripts/ci/pip_install.py), podmień na nie.
          #
          # Hermetyczne podejście: download kółek do wheelhouse, potem testy robią --no-index --find-links.
          python -m pip download -d "${WHEELHOUSE_DIR}" ".[dev]" pytest pytest-cov pre-commit

          echo "Wheelhouse contents:"
          ls -la "${WHEELHOUSE_DIR}" | head -n 50

      - name: Upload wheelhouse artifact
        if: env.WHEELHOUSE_SOURCE == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-files-found: error
          retention-days: 7

  # 2) “Fast” testy per OS
  fast-tests:
    name: Fast tests (${{ matrix.platform }})
    needs: prepare-wheelhouse
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest
          - platform: windows
            runs_on: [self-hosted, windows]

    runs-on: ${{ matrix.runs_on }}
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.run_fast

    env:
      WHEELHOUSE_ARTIFACT: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
      WHEELHOUSE_ENABLED: ${{ env.WHEELHOUSE_SOURCE != 'skip' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Install deps (from wheelhouse)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            # hermetycznie: żadnego pypi podczas joba testowego
            python -m pip install --no-index --find-links "${WHEELHOUSE_DIR}" -e ".[dev]"
            python -m pip install --no-index --find-links "${WHEELHOUSE_DIR}" pytest
          else
            python -m pip install -e ".[dev]" pytest
          fi

      - name: Generate stubs (optional)
        shell: bash
        run: |
          if [[ -f "scripts/generate_trading_stubs.py" ]]; then
            python scripts/generate_trading_stubs.py --skip-cpp || echo "Stub generation failed (ignored)."
          fi

      - name: Pytest fast
        shell: bash
        run: |
          pytest --maxfail=1 \
            -m "not qml and not integration and not e2e_demo_paper and not soak and not performance" \
            --ignore=tests/integration \
            --ignore=tests/e2e

  # 3) Lint – zwykle wystarczy na jednym OS (np. Linux), żeby nie mielić 3x tego samego.
  lint:
    name: Lint (pre-commit)
    needs: fast-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_lint
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install + pre-commit
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

  curated-tests:
    name: Curated unit suite (per OS)
    needs: fast-tests
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest
          - platform: windows
            runs_on: [self-hosted, windows]
    runs-on: ${{ matrix.runs_on }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_curated

    env:
      WHEELHOUSE_ARTIFACT: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
      WHEELHOUSE_ENABLED: ${{ env.WHEELHOUSE_SOURCE != 'skip' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            python -m pip install --no-index --find-links "${WHEELHOUSE_DIR}" -e ".[dev]"
            python -m pip install --no-index --find-links "${WHEELHOUSE_DIR}" pytest
          else
            python -m pip install -e ".[dev]" pytest
          fi

      - name: Pytest curated
        shell: bash
        run: |
          pytest \
            tests/test_pipeline_paper.py \
            tests/test_risk_profiles.py \
            tests/test_multi_strategy_scheduler.py \
            tests/test_trading_decision_journal.py

  integration-tests:
    name: Integration tests (per OS)
    needs: fast-tests
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest
          - platform: windows
            runs_on: [self-hosted, windows]
    runs-on: ${{ matrix.runs_on }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration

    env:
      WHEELHOUSE_ARTIFACT: wheelhouse-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
      WHEELHOUSE_ENABLED: ${{ env.WHEELHOUSE_SOURCE != 'skip' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheelhouse
        if: env.WHEELHOUSE_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEELHOUSE_ARTIFACT }}
          path: ${{ env.WHEELHOUSE_DIR }}
          if-no-artifact-found: error

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ "${WHEELHOUSE_ENABLED}" == "true" ]]; then
            python -m pip install --no-index --find-links "${WHEELHOUSE_DIR}" -e ".[dev]"
            python -m pip install --no-index --find-links "${WHEELHOUSE_DIR}" pytest
          else
            python -m pip install -e ".[dev]" pytest
          fi

      - name: Pytest integration
        shell: bash
        run: |
          pytest -m integration --maxfail=1
