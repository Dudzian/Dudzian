name: CI (Multi-platform)

run-name: "CI (${{ github.event_name }}: ${{ github.ref_name }})"

on:
  workflow_dispatch:
    inputs:
      run_packaging:
        description: "Build UI bundles (per OS)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  WHEELHOUSE_SOURCE: "build"
  WHEELHOUSE_DIR: "wheelhouse"
  PYSIDE6_VERSION: "6.10.2"

jobs:
  ###########################################################################
  # UI Packaging per OS (build only; no artifacts uploaded)
  ###########################################################################

  ui-packaging-linux:
    name: UI packaging (Linux bundle)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_packaging
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: deploy/packaging/requirements-desktop.txt
      - name: Install build deps (protobuf/grpc/archive + Qt runtime)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            libprotobuf-dev \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libgrpc-dev \
            libgrpc++-dev \
            libarchive-dev \
            libegl1 \
            libgl1 \
            libpulse0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0
          sudo rm -rf /var/lib/apt/lists/*
      - name: Install packaging dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r deploy/packaging/requirements-desktop.txt
      - name: Build installer (Linux)
        shell: bash
        run: |
          bash scripts/build_installer_linux.sh

  ui-packaging-windows:
    name: UI packaging (Windows bundle / self-hosted)
    runs-on: [self-hosted, windows]
    if: github.event_name == 'workflow_dispatch' && inputs.run_packaging
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: deploy/packaging/requirements-desktop.txt
      - name: Install packaging dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r deploy/packaging/requirements-desktop.txt
      - name: Build installer (Windows)
        shell: pwsh
        run: |
          ./scripts/build_installer_windows.ps1

  ui-packaging-macos:
    name: UI packaging (macOS bundle)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_packaging
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: deploy/packaging/requirements-desktop.txt
      - name: Install packaging dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r deploy/packaging/requirements-desktop.txt
      - name: Build installer (macOS)
        shell: bash
        run: |
          bash scripts/build_installer_macos.sh
