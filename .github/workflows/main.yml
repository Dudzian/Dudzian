name: CI (Windows self-hosted)

run-name: "CI (${{ github.event_name }}: ${{ github.ref_name }})"

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint (pre-commit)"
        type: boolean
        default: false
      run_fast:
        description: "Run fast deterministic tests"
        type: boolean
        default: true
      run_curated:
        description: "Run curated unit test list"
        type: boolean
        default: false
      run_integration:
        description: "Run integration tests"
        type: boolean
        default: false
      run_ui:
        description: "Run UI / QML tests"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  PYTHONHASHSEED: "0"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

  # Secrets presence flags (safe: only checks existence)
  HAS_MARKETPLACE_KEYS: ${{ secrets.MARKETPLACE_HMAC_KEY != '' }}
  HAS_LICENSING_KEYS: ${{ secrets.LICENSING_PRIVATE_KEY != '' }}

jobs:
  smoke-harness:
    name: Smoke harness (env + first failure)
    runs-on: [self-hosted, windows]
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest

      - name: Environment snapshot
        shell: pwsh
        run: |
          python -V
          python -m pip list --format=columns

      - name: Pytest (first failure)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force var/ci | Out-Null
          pytest -vv --maxfail=1 -x --junitxml=var/ci/smoke_harness_first.xml

  smoke-harness-all:
    name: Smoke harness (env + all failures)
    runs-on: [self-hosted, windows]
    needs: smoke-harness
    if: always()
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest

      - name: Environment snapshot
        shell: pwsh
        run: |
          python -V
          python -m pip list --format=columns

      - name: Pytest (all failures)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force var/ci | Out-Null
          pytest -vv --junitxml=var/ci/smoke_harness_all.xml

  lint:
    name: Lint (pre-commit)
    needs: smoke-harness
    runs-on: [self-hosted, windows]
    if: github.event_name == 'workflow_dispatch' && inputs.run_lint
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Pre-commit
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

  fast-tests:
    name: Fast tests (neutral)
    needs: smoke-harness
    runs-on: [self-hosted, windows]
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.run_fast
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pytest

      - name: Generate stubs (optional)
        shell: pwsh
        run: |
          if (Test-Path "scripts/generate_trading_stubs.py") {
            python scripts/generate_trading_stubs.py --skip-cpp
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Stub generation failed (ignored)."
            }
          } else {
            Write-Host "No stub generator found; skipping."
          }

      - name: Pytest fast
        shell: pwsh
        run: |
          pytest --maxfail=1 `
            -m "not qml and not integration and not e2e_demo_paper and not soak and not performance" `
            --ignore=tests/integration `
            --ignore=tests/e2e

  curated-tests:
    name: Curated unit suite
    needs: fast-tests
    runs-on: [self-hosted, windows]
    if: github.event_name == 'workflow_dispatch' && inputs.run_curated
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pytest

      - name: Pytest curated
        shell: pwsh
        run: |
          pytest `
            tests/test_pipeline_paper.py `
            tests/test_risk_profiles.py `
            tests/test_multi_strategy_scheduler.py `
            tests/test_trading_decision_journal.py

  integration-tests:
    name: Integration tests
    needs: fast-tests
    runs-on: [self-hosted, windows]
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pytest

      - name: Pytest integration
        shell: pwsh
        run: |
          pytest -m integration --maxfail=1

  ui-tests:
    name: UI / QML tests (${{ matrix.qt_qpa_platform }})
    needs: fast-tests
    runs-on: [self-hosted, windows]
    if: github.event_name == 'workflow_dispatch' && inputs.run_ui
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        qt_qpa_platform: ${{ fromJSON(vars.RUN_QT_WINDOWS_PLATFORM == '1' && '["offscreen","windows"]' || '["offscreen"]') }}
    env:
      RUN_QT_WINDOWS_PLATFORM: ${{ vars.RUN_QT_WINDOWS_PLATFORM }}
      QT_OPENGL: software

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pytest pytest-xdist

      - name: Ensure ProcDump is available
        shell: pwsh
        run: |
          $procdump = Get-Command procdump.exe -ErrorAction SilentlyContinue
          if (-not $procdump) {
            $procdumpDir = "tools/procdump"
            New-Item -ItemType Directory -Force $procdumpDir | Out-Null
            $zipPath = Join-Path $procdumpDir "procdump.zip"
            Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" -OutFile $zipPath
            Expand-Archive -Path $zipPath -DestinationPath $procdumpDir -Force
            Add-Content $env:GITHUB_PATH $procdumpDir
          }

      - name: Check UI deps
        shell: pwsh
        run: |
          python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('PySide6') else 1)"
        continue-on-error: true

      - name: Pytest UI
        shell: pwsh
        run: |
          ./scripts/run_qml_tests_windows.ps1 -QtQpaPlatform "${{ matrix.qt_qpa_platform }}" -QtOpenGL "${{ env.QT_OPENGL }}"

      - name: Upload QML diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-test-diagnostics-${{ matrix.qt_qpa_platform }}
          path: |
            test-results/qml/**
            var/crashdumps/**
            var/crashdumps/**/*.dmp
          if-no-files-found: warn
          retention-days: 5
